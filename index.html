<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>NEOVOID</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; background: #04060e;
    overflow: hidden; user-select: none; touch-action: none;
  }
  canvas { display: block; cursor: none; }
</style>

<body>
<canvas id="c"></canvas>
<script>
'use strict';
/* ============================================================
   NEOVOID — neon twin-stick arena survival
   100% procedural: zero image / audio / font assets.
   ============================================================ */
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
if (!ctx.roundRect) ctx.roundRect = function (x, y, w, h, r) { this.rect(x, y, w, h); };
let W = 0, H = 0, DPR = 1;

// ---------- helpers ----------
const rand  = (a, b) => a + Math.random() * (b - a);
const randI = (a, b) => Math.floor(rand(a, b + 1));
const pick  = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp  = (a, b, t) => a + (b - a) * t;
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const shuffle = a => { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
const rgbaCache = {};
function rgbaFromHex(h) {
  let r = rgbaCache[h];
  if (!r) {
    r = `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},1)`;
    rgbaCache[h] = r;
  }
  return r;
}

// ============================================================
// AUDIO — everything synthesized with Web Audio
// ============================================================
let AC = null, master = null, sfxBus = null, musicBus = null, delaySend = null;
let noiseBuf = null, muted = false;

function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = muted ? 0 : 0.9;
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -18; comp.knee.value = 20; comp.ratio.value = 8;
  master.connect(comp); comp.connect(AC.destination);

  sfxBus = AC.createGain(); sfxBus.gain.value = 0.85; sfxBus.connect(master);
  musicBus = AC.createGain(); musicBus.gain.value = 0.55; musicBus.connect(master);

  // ping-pong-ish feedback delay for arps
  delaySend = AC.createGain(); delaySend.gain.value = 1;
  const dl = AC.createDelay(1.0); dl.delayTime.value = 0.32;
  const fb = AC.createGain(); fb.gain.value = 0.34;
  const dwet = AC.createGain(); dwet.gain.value = 0.35;
  delaySend.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(dwet); dwet.connect(musicBus);

  // shared noise buffer
  noiseBuf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

  startMusic();
}

function tone(o) {
  // o: {type, f0, f1, dur, vol, bus, attack, filter}
  if (!AC || muted) return;
  const t = AC.currentTime;
  const osc = AC.createOscillator();
  osc.type = o.type || 'square';
  osc.frequency.setValueAtTime(o.f0, t);
  if (o.f1) osc.frequency.exponentialRampToValueAtTime(Math.max(1, o.f1), t + o.dur);
  const g = AC.createGain();
  const a = o.attack || 0.004;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(o.vol, t + a);
  g.gain.exponentialRampToValueAtTime(0.0001, t + o.dur);
  let node = osc;
  if (o.filter) {
    const f = AC.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = o.filter;
    osc.connect(f); node = f;
  }
  node.connect(g); g.connect(o.bus || sfxBus);
  osc.start(t); osc.stop(t + o.dur + 0.05);
}

function noise(o) {
  // o: {dur, vol, f0, f1, hp}
  if (!AC || muted) return;
  const t = AC.currentTime;
  const src = AC.createBufferSource();
  src.buffer = noiseBuf; src.loop = true;
  const f = AC.createBiquadFilter();
  f.type = o.hp ? 'highpass' : 'lowpass';
  f.frequency.setValueAtTime(o.f0 || 2000, t);
  if (o.f1) f.frequency.exponentialRampToValueAtTime(Math.max(20, o.f1), t + o.dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(o.vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + o.dur);
  src.connect(f); f.connect(g); g.connect(o.bus || sfxBus);
  src.start(t); src.stop(t + o.dur + 0.05);
}

let sfxExpl = 0; // per-frame explosion budget (avoid clipping)
const SFX = {
  shoot() {
    tone({ type: 'square', f0: rand(860, 940), f1: 300, dur: 0.07, vol: 0.055, filter: 2600 });
  },
  hit() {
    tone({ type: 'triangle', f0: 220, f1: 140, dur: 0.05, vol: 0.10 });
  },
  explode(big) {
    if (sfxExpl >= 3) return; sfxExpl++;
    noise({ dur: big ? 0.5 : 0.25, vol: big ? 0.5 : 0.28, f0: big ? 2600 : 1800, f1: 120 });
    tone({ type: 'sine', f0: big ? 130 : 180, f1: 40, dur: big ? 0.4 : 0.22, vol: big ? 0.55 : 0.3 });
  },
  gem(streak) {
    const f = 420 * Math.pow(2, Math.min(streak, 24) / 12);
    tone({ type: 'sine', f0: f, f1: f * 1.6, dur: 0.11, vol: 0.16 });
  },
  dash() {
    noise({ dur: 0.22, vol: 0.30, f0: 500, f1: 5000, hp: true });
  },
  death() {
    noise({ dur: 0.9, vol: 0.6, f0: 3200, f1: 60 });
    tone({ type: 'sawtooth', f0: 300, f1: 30, dur: 0.9, vol: 0.5, filter: 1200 });
  },
  wave() {
    tone({ type: 'triangle', f0: 440, dur: 0.12, vol: 0.2 });
    setTimeout(() => tone({ type: 'triangle', f0: 660, dur: 0.2, vol: 0.2 }), 110);
  },
  boss() {
    for (let i = 0; i < 3; i++)
      setTimeout(() => tone({ type: 'sawtooth', f0: 190, f1: 150, dur: 0.28, vol: 0.3, filter: 900 }), i * 320);
  },
  oneUp() {
    [523, 659, 784, 1046].forEach((f, i) =>
      setTimeout(() => tone({ type: 'square', f0: f, dur: 0.14, vol: 0.14, filter: 3000 }), i * 90));
  },
  eShoot() {
    tone({ type: 'sawtooth', f0: 520, f1: 200, dur: 0.09, vol: 0.05, filter: 1400 });
  },
  levelup() {
    [392, 523, 659, 784].forEach((f, i) =>
      setTimeout(() => tone({ type: 'triangle', f0: f, dur: 0.16, vol: 0.16, filter: 4000 }), i * 80));
  },
  pick() {
    tone({ type: 'square', f0: 620, f1: 880, dur: 0.09, vol: 0.12, filter: 2600 });
  },
  shieldBreak() {
    noise({ dur: 0.35, vol: 0.4, f0: 4000, f1: 300 });
    tone({ type: 'sawtooth', f0: 500, f1: 120, dur: 0.3, vol: 0.25, filter: 1600 });
  },
  shieldOn() {
    tone({ type: 'sine', f0: 320, f1: 640, dur: 0.18, vol: 0.12 });
  },
  heart() {
    tone({ type: 'sine', f0: 523, dur: 0.1, vol: 0.15 });
    setTimeout(() => tone({ type: 'sine', f0: 784, dur: 0.18, vol: 0.15 }), 90);
  },
  zap() {
    tone({ type: 'square', f0: 1200, f1: 300, dur: 0.08, vol: 0.09, filter: 3200 });
    noise({ dur: 0.06, vol: 0.07, f0: 6000, hp: true });
  },
  nova() {
    tone({ type: 'sawtooth', f0: 200, f1: 700, dur: 0.18, vol: 0.11, filter: 2000 });
  },
  warp() {
    tone({ type: 'sine', f0: 700, f1: 120, dur: 0.25, vol: 0.16 });
  },
  charge() {
    tone({ type: 'sawtooth', f0: 80, f1: 230, dur: 0.7, vol: 0.16, filter: 600 });
  },
  victory() {
    [523, 659, 784, 1046, 1318].forEach((f, i) =>
      setTimeout(() => tone({ type: 'triangle', f0: f, dur: 0.3, vol: 0.18, filter: 5000 }), i * 130));
  },
  expand() {
    tone({ type: 'sine', f0: 70, f1: 240, dur: 1.0, vol: 0.25 });
    noise({ dur: 0.8, vol: 0.1, f0: 400, f1: 3000, hp: true });
  },
  odReady() {
    tone({ type: 'triangle', f0: 660, f1: 990, dur: 0.14, vol: 0.12, filter: 4000 });
  },
  odOn() {
    tone({ type: 'sawtooth', f0: 160, f1: 520, dur: 0.5, vol: 0.22, filter: 3000 });
    [523, 784, 1046].forEach((f, i) => setTimeout(() => tone({ type: 'square', f0: f, dur: 0.16, vol: 0.12, filter: 3600 }), i * 70));
    noise({ dur: 0.6, vol: 0.28, f0: 200, f1: 6000, hp: true });
  },
  odOff() {
    tone({ type: 'sine', f0: 520, f1: 160, dur: 0.35, vol: 0.14 });
  },
};

// ---- procedural music (16-step sequencer, A minor) ----
const BPM = 138, STEP = 60 / BPM / 2; // 8th notes
const bassPat = [0, 0, null, 0, 0, null, 3, null, 0, 0, null, 0, 5, null, 3, 2];
// boss mode: relentless driving ostinato with tritone menace
const bossBass = [0, 0, 0, 0, -2, -2, 6, 6, 0, 0, 0, 0, 5, 5, 6, 6];
const arpScale = [0, 3, 5, 7, 10, 12, 15];
const bossArp = [0, 6, 7, 11, 12, 18];
let musicStep = 0, musicNext = 0, musicTimer = null;
let bossActive = false, bossMix = 0; // bossMix eases 0→1 so the switch isn't jarring

function startMusic() {
  musicNext = AC.currentTime + 0.1;
  musicStep = 0;
  musicTimer = setInterval(scheduleMusic, 25);
}
function scheduleMusic() {
  if (!AC || muted) return;
  if (musicNext < AC.currentTime - 0.2) musicNext = AC.currentTime; // tab-throttle catchup
  // ease toward/away from the boss theme
  bossMix += ((bossActive ? 1 : 0) - bossMix) * 0.08;
  const bm = bossMix;
  const base = state === S_PLAY ? clamp(mult / 25, 0.12, 1) : 0.1;
  const intensity = Math.max(base, bm); // boss pins the mix wide open
  while (musicNext < AC.currentTime + 0.12) {
    const t = musicNext, s = musicStep;
    // bass — boss swaps to a driving tritone ostinato an octave lower
    const semi = bm > 0.5 ? bossBass[s] : bassPat[s];
    if (semi !== null) {
      const osc = AC.createOscillator(); osc.type = 'sawtooth';
      osc.frequency.value = (bm > 0.5 ? 41.2 : 55) * Math.pow(2, semi / 12);
      const f = AC.createBiquadFilter(); f.type = 'lowpass';
      f.frequency.value = 220 + intensity * 1400 + bm * 700;
      f.Q.value = 1 + bm * 6; // resonant snarl under the boss
      const g = AC.createGain();
      g.gain.setValueAtTime(0.22 + bm * 0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + STEP * (bm > 0.5 ? 0.7 : 0.95));
      osc.connect(f); f.connect(g); g.connect(musicBus);
      osc.start(t); osc.stop(t + STEP);
    }
    // kick — boss adds a driving offbeat kick
    if (s % 4 === 0 || (bm > 0.5 && s % 4 === 2)) {
      const osc = AC.createOscillator(); osc.type = 'sine';
      osc.frequency.setValueAtTime(110, t);
      osc.frequency.exponentialRampToValueAtTime(38, t + 0.12);
      const g = AC.createGain();
      g.gain.setValueAtTime(0.5, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      osc.connect(g); g.connect(musicBus);
      osc.start(t); osc.stop(t + 0.16);
    }
    // hats — double-time during the boss
    if ((bm > 0.5 ? s % 2 === 1 : s % 4 === 2) && noiseBuf) {
      const src = AC.createBufferSource(); src.buffer = noiseBuf;
      const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 8000;
      const g = AC.createGain();
      g.gain.setValueAtTime(0.06 + intensity * 0.05, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      src.connect(f); f.connect(g); g.connect(musicBus);
      src.start(t); src.stop(t + 0.06);
    }
    // boss-only: snare crack on the backbeat + tritone alarm stab each bar
    if (bm > 0.5 && noiseBuf && s % 8 === 4) {
      const src = AC.createBufferSource(); src.buffer = noiseBuf;
      const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1900; f.Q.value = 0.8;
      const g = AC.createGain();
      g.gain.setValueAtTime(0.24 * bm, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
      src.connect(f); f.connect(g); g.connect(musicBus);
      src.start(t); src.stop(t + 0.18);
    }
    if (bm > 0.5 && s === 0) {
      for (const iv of [0, 6]) { // root + tritone = dread
        const osc = AC.createOscillator(); osc.type = 'square';
        osc.frequency.value = 220 * Math.pow(2, iv / 12);
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1400;
        const g = AC.createGain();
        g.gain.setValueAtTime(0.07 * bm, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + STEP * 3);
        osc.connect(f); f.connect(g); g.connect(musicBus); g.connect(delaySend);
        osc.start(t); osc.stop(t + STEP * 3.2);
      }
    }
    // arp — sparkle normally, tense chromatic figure under the boss
    if (s % 2 === 1 && Math.random() < 0.35 + intensity * 0.5) {
      const osc = AC.createOscillator(); osc.type = bm > 0.5 ? 'sawtooth' : 'triangle';
      const scale = bm > 0.5 ? bossArp : arpScale;
      osc.frequency.value = 220 * Math.pow(2, (pick(scale) + 12) / 12);
      const g = AC.createGain();
      g.gain.setValueAtTime((0.05 + intensity * 0.06) * (bm > 0.5 ? 0.7 : 1), t);
      g.gain.exponentialRampToValueAtTime(0.001, t + STEP * 1.8);
      osc.connect(g); g.connect(musicBus); g.connect(delaySend);
      osc.start(t); osc.stop(t + STEP * 2);
    }
    musicNext += STEP;
    musicStep = (musicStep + 1) % 16;
  }
}

// ============================================================
// GLOW SPRITES (pre-rendered radial gradients, cached per color)
// ============================================================
const glowCache = {};
function glowSprite(color) {
  let g = glowCache[color];
  if (g) return g;
  const s = 64, c = document.createElement('canvas');
  c.width = c.height = s;
  const x = c.getContext('2d');
  const gr = x.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
  gr.addColorStop(0, color);
  gr.addColorStop(0.35, color.replace('1)', '0.35)'));
  gr.addColorStop(1, color.replace('1)', '0)'));
  x.fillStyle = gr; x.fillRect(0, 0, s, s);
  glowCache[color] = c;
  return c;
}
function drawGlow(x, y, r, rgba, alpha) {
  ctx.globalAlpha = alpha;
  ctx.drawImage(glowSprite(rgba), x - r, y - r, r * 2, r * 2);
  ctx.globalAlpha = 1;
}

// ============================================================
// SPRING GRID
// ============================================================
const grid = { pts: [], cols: 0, rows: 0, sp: 46 };
function initGrid() {
  grid.cols = Math.ceil(W / grid.sp) + 1;
  grid.rows = Math.ceil(H / grid.sp) + 1;
  grid.pts = [];
  for (let r = 0; r < grid.rows; r++)
    for (let c = 0; c < grid.cols; c++)
      grid.pts.push({ x: c * grid.sp, y: r * grid.sp, ox: c * grid.sp, oy: r * grid.sp, vx: 0, vy: 0 });
}
function updateGrid(dt) {
  const k = 42, damp = Math.exp(-4.2 * dt);
  for (const p of grid.pts) {
    p.vx += (p.ox - p.x) * k * dt;
    p.vy += (p.oy - p.y) * k * dt;
    p.vx *= damp; p.vy *= damp;
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
}
function shockGrid(x, y, radius, str) {
  const r2 = radius * radius;
  for (const p of grid.pts) {
    const dx = p.ox - x, dy = p.oy - y;
    if (Math.abs(dx) > radius || Math.abs(dy) > radius) continue;
    const d2 = dx * dx + dy * dy;
    if (d2 > r2 || d2 === 0) continue;
    const d = Math.sqrt(d2), f = (1 - d / radius) * str;
    p.vx += (dx / d) * f;
    p.vy += (dy / d) * f;
  }
}
function drawGrid(alpha) {
  const { pts, cols, rows } = grid;
  ctx.lineWidth = 1;
  ctx.strokeStyle = `rgba(64,96,255,${alpha != null ? alpha : 0.17})`;
  ctx.beginPath();
  for (let r = 0; r < rows; r++) {
    const o = r * cols;
    ctx.moveTo(pts[o].x, pts[o].y);
    for (let c = 1; c < cols; c++) ctx.lineTo(pts[o + c].x, pts[o + c].y);
  }
  for (let c = 0; c < cols; c++) {
    ctx.moveTo(pts[c].x, pts[c].y);
    for (let r = 1; r < rows; r++) ctx.lineTo(pts[r * cols + c].x, pts[r * cols + c].y);
  }
  ctx.stroke();
}

// ============================================================
// SPACE BACKDROP — layered stars, nebulae, shooting stars, galaxy
// ============================================================
let stars = [], nebulae = [], dust = [], shooters = [], vign = null;
const STAR_TINTS = ['255,255,255', '180,205,255', '255,225,190', '200,235,255', '235,200,255'];
function initStars() {
  stars = [];
  const n = Math.floor(W * H / 5200);
  for (let i = 0; i < n; i++) {
    const layer = Math.random() < 0.6 ? 0 : Math.random() < 0.7 ? 1 : 2; // depth: far→near
    stars.push({
      x: rand(0, W), y: rand(0, H),
      s: layer === 0 ? rand(0.4, 1) : layer === 1 ? rand(0.9, 1.7) : rand(1.4, 2.6),
      base: layer === 0 ? 0.18 : layer === 1 ? 0.34 : 0.55,
      tw: rand(0.4, 1.6), ph: rand(0, TAU), layer,
      tint: Math.random() < 0.78 ? STAR_TINTS[0] : pick(STAR_TINTS),
    });
  }
  // soft nebula clouds (persistent, generated once per resize)
  nebulae = [];
  const cols = [[90, 60, 190], [40, 90, 200], [180, 50, 140], [40, 140, 160], [120, 70, 200]];
  const nn = 5;
  for (let i = 0; i < nn; i++) {
    const c = pick(cols);
    nebulae.push({
      x: rand(W * 0.05, W * 0.95), y: rand(H * 0.05, H * 0.95),
      r: rand(Math.min(W, H) * 0.22, Math.min(W, H) * 0.5),
      c, a: rand(0.05, 0.11), drift: rand(0, TAU), ds: rand(0.006, 0.02),
    });
  }
  // slow drifting dust motes
  dust = [];
  const dn = Math.floor(W * H / 42000);
  for (let i = 0; i < dn; i++)
    dust.push({ x: rand(0, W), y: rand(0, H), s: rand(0.6, 1.4), vx: rand(-4, 4), vy: rand(-6, -2), tint: pick(STAR_TINTS) });

  vign = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.34, W / 2, H / 2, Math.max(W, H) * 0.75);
  vign.addColorStop(0, 'rgba(0,0,0,0)');
  vign.addColorStop(1, 'rgba(2,2,14,0.62)');
}

function updateSpace(dt, ambient) {
  for (const d of dust) {
    d.x += d.vx * dt; d.y += d.vy * dt;
    if (d.y < -4) { d.y = H + 4; d.x = rand(0, W); }
    if (d.x < -4) d.x = W + 4; else if (d.x > W + 4) d.x = -4;
  }
  for (let i = shooters.length - 1; i >= 0; i--) {
    const s = shooters[i];
    s.life -= dt; s.x += s.vx * dt; s.y += s.vy * dt;
    if (s.life <= 0) shooters.splice(i, 1);
  }
  if (ambient && Math.random() < dt * 0.35) {
    const a = rand(Math.PI * 0.15, Math.PI * 0.42), sp = rand(520, 820);
    shooters.push({ x: rand(0, W), y: rand(-10, H * 0.4), vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: rand(0.5, 0.9), len: rand(60, 130), tint: pick(STAR_TINTS) });
  }
}

// draw nebulae + stars. `depth` scrolls the parallax with a focal point (mouse / player)
function drawSpace(now, focusX, focusY) {
  // nebula clouds (screen blend for soft glow)
  ctx.globalCompositeOperation = 'lighter';
  for (const nb of nebulae) {
    const dx = Math.cos(now * 0.0001 + nb.drift) * 18;
    const dy = Math.sin(now * 0.00013 + nb.drift) * 14;
    const pulse = nb.a * (0.8 + 0.2 * Math.sin(now * 0.0004 + nb.drift));
    const g = ctx.createRadialGradient(nb.x + dx, nb.y + dy, 0, nb.x + dx, nb.y + dy, nb.r);
    g.addColorStop(0, `rgba(${nb.c[0]},${nb.c[1]},${nb.c[2]},${pulse})`);
    g.addColorStop(0.5, `rgba(${nb.c[0]},${nb.c[1]},${nb.c[2]},${pulse * 0.4})`);
    g.addColorStop(1, `rgba(${nb.c[0]},${nb.c[1]},${nb.c[2]},0)`);
    ctx.fillStyle = g;
    ctx.fillRect(nb.x + dx - nb.r, nb.y + dy - nb.r, nb.r * 2, nb.r * 2);
  }
  ctx.globalCompositeOperation = 'source-over';

  // parallax offset
  const ox = focusX === undefined ? 0 : (focusX - W / 2);
  const oy = focusY === undefined ? 0 : (focusY - H / 2);
  for (const s of stars) {
    const px = s.layer * 0.012, py = s.layer * 0.012;
    const x = s.x - ox * px, y = s.y - oy * py;
    const tw = s.base * (0.55 + 0.45 * Math.sin(now * 0.001 * s.tw + s.ph));
    ctx.fillStyle = `rgba(${s.tint},${tw})`;
    if (s.layer === 2) {
      ctx.beginPath(); ctx.arc(x, y, s.s, 0, TAU); ctx.fill();
    } else {
      ctx.fillRect(x, y, s.s, s.s);
    }
  }
  // dust
  for (const d of dust) {
    ctx.fillStyle = `rgba(${d.tint},0.22)`;
    ctx.fillRect(d.x, d.y, d.s, d.s);
  }
  // shooting stars
  ctx.globalCompositeOperation = 'lighter';
  ctx.lineCap = 'round';
  for (const s of shooters) {
    const a = clamp(s.life / 0.9, 0, 1);
    const nx = s.x - s.vx / Math.hypot(s.vx, s.vy) * s.len;
    const ny = s.y - s.vy / Math.hypot(s.vx, s.vy) * s.len;
    const g = ctx.createLinearGradient(nx, ny, s.x, s.y);
    g.addColorStop(0, `rgba(${s.tint},0)`);
    g.addColorStop(1, `rgba(${s.tint},${0.8 * a})`);
    ctx.strokeStyle = g; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(nx, ny); ctx.lineTo(s.x, s.y); ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';
}

// procedural shaded planet — hero art with zero image assets
function drawPlanet(cx, cy, r, now, hex, opts) {
  opts = opts || {};
  const rgb = [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
  ctx.save();
  // atmosphere halo
  const halo = ctx.createRadialGradient(cx, cy, r * 0.85, cx, cy, r * 1.35);
  halo.addColorStop(0, `rgba(${rgb},0.28)`);
  halo.addColorStop(1, `rgba(${rgb},0)`);
  ctx.fillStyle = halo;
  ctx.fillRect(cx - r * 1.4, cy - r * 1.4, r * 2.8, r * 2.8);

  // back half of ring
  if (opts.ring) {
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(opts.ringTilt || -0.5);
    ctx.strokeStyle = `rgba(${rgb},0.5)`;
    ctx.lineWidth = r * 0.09;
    ctx.beginPath(); ctx.ellipse(0, 0, r * 1.7, r * 0.5, 0, Math.PI, TAU); ctx.stroke();
    ctx.restore();
  }

  // sphere body
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.clip();
  const lit = ctx.createRadialGradient(cx - r * 0.4, cy - r * 0.45, r * 0.1, cx, cy, r * 1.35);
  lit.addColorStop(0, `rgb(${Math.min(255, rgb[0] + 90)},${Math.min(255, rgb[1] + 90)},${Math.min(255, rgb[2] + 90)})`);
  lit.addColorStop(0.5, `rgb(${rgb})`);
  lit.addColorStop(1, `rgb(${rgb[0] * 0.18 | 0},${rgb[1] * 0.18 | 0},${rgb[2] * 0.18 | 0})`);
  ctx.fillStyle = lit;
  ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
  // drifting banded texture
  ctx.globalAlpha = 0.14;
  for (let i = -3; i <= 3; i++) {
    ctx.fillStyle = i % 2 ? '#ffffff' : '#000000';
    const yy = cy + i * r * 0.32 + Math.sin(now * 0.0002 + i) * 4;
    ctx.beginPath();
    ctx.ellipse(cx + Math.sin(now * 0.0003 + i) * r * 0.2, yy, r * 1.1, r * 0.13, 0, 0, TAU);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // night-side terminator
  const term = ctx.createRadialGradient(cx + r * 0.55, cy + r * 0.5, r * 0.1, cx + r * 0.2, cy + r * 0.2, r * 1.5);
  term.addColorStop(0, 'rgba(2,3,12,0)');
  term.addColorStop(1, 'rgba(2,3,12,0.82)');
  ctx.fillStyle = term;
  ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
  ctx.restore();

  // bright rim light
  ctx.strokeStyle = `rgba(${Math.min(255, rgb[0] + 120)},${Math.min(255, rgb[1] + 120)},${Math.min(255, rgb[2] + 120)},0.5)`;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, r - 1, -2.5, -0.4); ctx.stroke();

  // front half of ring
  if (opts.ring) {
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(opts.ringTilt || -0.5);
    ctx.strokeStyle = `rgba(${Math.min(255, rgb[0] + 60)},${Math.min(255, rgb[1] + 60)},${Math.min(255, rgb[2] + 60)},0.75)`;
    ctx.lineWidth = r * 0.09;
    ctx.beginPath(); ctx.ellipse(0, 0, r * 1.7, r * 0.5, 0, 0, Math.PI); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

// faint rotating spiral galaxy for the campaign map centerpiece
function drawSpiralGalaxy(cx, cy, R, now, tint) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const rot = now * 0.00006;
  const arms = 2, per = 190;
  for (let arm = 0; arm < arms; arm++) {
    for (let i = 0; i < per; i++) {
      const t = i / per;
      const ang = rot + arm * Math.PI + t * 5.2;
      const rr = t * R;
      const x = cx + Math.cos(ang) * rr;
      const y = cy + Math.sin(ang) * rr * 0.62; // slight ellipse
      const a = (1 - t) * 0.16;
      ctx.fillStyle = `rgba(${tint},${a})`;
      ctx.beginPath();
      ctx.arc(x, y, (1 - t) * 1.8 + 0.4, 0, TAU);
      ctx.fill();
    }
  }
  // bright core
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.28);
  g.addColorStop(0, `rgba(255,250,235,0.5)`);
  g.addColorStop(0.4, `rgba(${tint},0.22)`);
  g.addColorStop(1, `rgba(${tint},0)`);
  ctx.fillStyle = g;
  ctx.fillRect(cx - R * 0.3, cy - R * 0.3, R * 0.6, R * 0.6);
  ctx.restore();
}

const arena = { x0: 0, y0: 0, x1: 0, y1: 0, tx0: 0, ty0: 0, tx1: 0, ty1: 0, frac: 1 };
function setArena(frac, instant) {
  arena.frac = frac;
  const iw = W * (1 - frac) / 2, ih = H * (1 - frac) / 2;
  arena.tx0 = iw; arena.ty0 = ih;
  arena.tx1 = W - iw; arena.ty1 = H - ih;
  if (instant) {
    arena.x0 = arena.tx0; arena.y0 = arena.ty0;
    arena.x1 = arena.tx1; arena.y1 = arena.ty1;
  }
}
function updateArena(dt) {
  const k = Math.min(1, 2.5 * dt);
  arena.x0 += (arena.tx0 - arena.x0) * k;
  arena.y0 += (arena.ty0 - arena.y0) * k;
  arena.x1 += (arena.tx1 - arena.x1) * k;
  arena.y1 += (arena.ty1 - arena.y1) * k;
}
const arenaCX = () => (arena.x0 + arena.x1) / 2;
const arenaCY = () => (arena.y0 + arena.y1) / 2;

// effective difficulty wave (campaign planets map onto the endless curve)
// planets now run longer, so weight the wave term down to keep the curve in the tuned range
function dwave() { return mode === 'campaign' ? Math.round(planetIdx * 2.2 + wave * 0.8) : wave; }

// ---- late-game difficulty curves ----
// mob toughness. Endless rides the wave curve. Campaign deliberately does NOT use dwave here:
// arriving at a late planet would otherwise put 2x-hp mobs on wave 1 and stall the run before
// the player has any upgrades. Each planet restarts gentle and ramps hard within itself.
function mobHpMul() {
  if (mode === 'campaign') return Math.pow(1.05, planetIdx) * Math.pow(1.06, Math.max(0, wave - 1));
  return Math.pow(1.05, Math.max(0, wave - 5));
}
// bosses scale super-exponentially: OD should be a dent in the bar, not the fight
function bossHp(w, hpMul, packScale) {
  return Math.round((60 + w * 11) * Math.pow(1.062, w) * hpMul * packScale * campaignBossMul());
}
// conquest planets pile their own multiplier on top — late sectors are a wall
function campaignBossMul() { return mode === 'campaign' ? 1 + planetIdx * 0.22 : 1; }
// boss waves land more often and in bigger packs the deeper you go
function bossEvery(w) { return w >= 38 ? 2 : w >= 26 ? 3 : w >= 15 ? 4 : 5; }
function bossCount(w) { return Math.min(5, 1 + Math.floor(Math.max(0, w - 11) / 8)); }
const BOSS_PACK_SCALE = [1, 0.86, 0.74, 0.64, 0.56];
function liveBosses() { let n = 0; for (const e of enemies) if (e.type === 'boss') n++; return n; }

// A boss encounter is fought in stages: one boss to open, then pairs. The next stage only
// arrives once the current one is dead, so you never face more than two at a time.
const BOSS_STAGE_MAX = 2;
let bossQueue = [], bossStageT = 0, bossEncounterScale = 1, bossStageNo = 0, bossStageTotal = 0;
function bossStages(defs) {
  const rest = defs.slice(), stages = [];
  if (rest.length) stages.push([rest.shift()]); // the opener is always a single boss
  while (rest.length) stages.push(rest.splice(0, BOSS_STAGE_MAX));
  return stages;
}
// Scale off the whole encounter, not the stage. Staged fights are much slower per point of
// hp than simultaneous ones — pierce, orbitals and chain no longer splash across the pack —
// so a multi-stage encounter gets a discount, or THE CORE turns into a 20-minute slog.
// Single-stage planets are untouched; totals still escalate (1 -> 1.11 -> 1.33 boss-units).
function startBossEncounter(defs, delay) {
  bossQueue = bossStages(defs);
  const stages = bossQueue.length;
  bossEncounterScale = BOSS_PACK_SCALE[Math.min(defs.length, 5) - 1] / (1 + (stages - 1) * 0.55);
  bossStageNo = 0;
  bossStageTotal = stages;
  bossStageT = delay || 0;
}
function spawnBossStage(subFor) {
  const stage = bossQueue.shift();
  if (!stage) return;
  bossStageNo++;
  const names = stage.map(d => d.name).join(' + ');
  banner = {
    txt: names + (stage.length > 1 ? ' AWAKEN' : ' AWAKENS'),
    sub: bossStageTotal > 1 ? 'wave ' + bossStageNo + ' of ' + bossStageTotal + ' — ' + subFor : subFor,
    t: 2.4, max: 2.4, color: stage[0].color,
  };
  SFX.boss();
  for (const d of stage) { const p = edgeSpawnPos(); spawnBoss(d, p.x, p.y, bossEncounterScale); }
  bossStageT = 1.8; // breather before the next stage, counted once this one is dead
}
function bossEncounterBusy() { return bossQueue.length > 0 || liveBosses() > 0; }
// ambient pressure: shorter gaps, more per tick, higher ceiling
function ambientGap(w) { return Math.max(0.26, 2.25 * Math.pow(0.952, w)); }
function ambientBatch(w) { return 1 + Math.floor(Math.max(0, w - 24) / 12); }
// wanderers drift rather than chase — they shouldn't outpace the enemies that do
const WANDER_SPD = 74;
function galaxyPos(i) {
  const n = PLANETS.length;
  if (i === n - 1) return { x: W / 2, y: H * 0.54 }; // THE CORE sits at the heart
  const t = i / (n - 1);
  const ang = 4.1 * (1 - t) + 0.6;
  const rad = (1 - t) * Math.min(W, H) * 0.34 + 60;
  return { x: W / 2 + Math.cos(ang) * rad * 1.35, y: H * 0.54 + Math.sin(ang) * rad * 0.85 };
}
function allConquered() {
  for (let i = 0; i < PLANETS.length; i++) if (!conquered[i]) return false;
  return true;
}

function updateTutorial(dt) {
  tut.t += dt;
  const step = TUT_STEPS[tut.step];
  if (step.key === 'move') {
    tut.moved += Math.hypot(player.vx, player.vy) * dt;
    if (tut.moved > 300) tutNext();
  } else if (step.key === 'aim') {
    if (enemies.length === 0 && tut.t > 0.6 && !tut.aimSpawned) { tutSpawnTargets(); tut.aimSpawned = true; }
    if (tut.aimSpawned && tut.kills >= 4) tutNext();
  } else if (step.key === 'gem') {
    if (!tut.gemDropped) { tutDropGems(); tut.gemDropped = true; }
    // completed once the player has picked an upgrade (choice closes, level rose)
    if (!choice && Object.keys(player.up).length > 0) tutNext();
  } else if (step.key === 'dash') {
    if (player.dashT > 0) tut.dashed = true;
    if (tut.dashed && player.dashCd < 1.0) tutNext();
  } else if (step.key === 'od') {
    // hand the player a full meter and some targets to melt
    if (!tut.odPrimed) {
      tut.odPrimed = true;
      odCharge = OD_MAX; odReadyPulse = 1;
      SFX.odReady();
      tutSpawnTargets();
      tutSpawnTargets();
    }
    if (odCharge < OD_MAX && odActive <= 0) { odCharge = OD_MAX; } // keep it topped up until they use it
    if (odActive > 0) tut.odUsed = true;
    if (tut.odUsed && odActive <= 0) tutNext();
  } else if (step.key === 'done') {
    tut.doneT += dt;
    if (!tut.celebrated) {
      tut.celebrated = true;
      for (let i = 0; i < 3; i++)
        setTimeout(() => addExplosion(arenaCX() + rand(-120, 120), arenaCY() + rand(-80, 80), pick([COL.gem, COL.bullet, COL.player]), 24, 260), i * 180);
      SFX.victory();
    }
  }
}
function tutNext() {
  tut.step++;
  tut.t = 0;
  if (tut.step < TUT_STEPS.length) {
    const k = TUT_STEPS[tut.step].key;
    banner = { txt: TUT_STEPS[tut.step].title, sub: null, t: 1.3, max: 1.3, color: COL.player };
    SFX.wave();
  }
}
function endTutorial() {
  if (tut && tut.fromIntro) localStorage.setItem('neovoid_intro', '1');
  tut = null;
  mode = 'endless';
  state = S_MENU; menuHover = 0;
}

function makeElite(e) {
  e.elite = true;
  e.r *= 1.35;
  e.hp = e.maxHp = e.hp * 4;
  e.score *= 3;
  e.gems += 2;
  e.spdMul = 1.15;
}

function spawnEnemy(type, x, y, opts) {
  const d = EDEF[type];
  const e = {
    type, x, y, vx: 0, vy: 0,
    r: d.r, hp: d.hp, maxHp: d.hp,
    score: d.score, gems: d.gems, color: d.color,
    ang: rand(0, TAU), spin: rand(-2, 2),
    spawnT: type === 'shard' ? 0.15 : 0.75,
    flash: 0, fireT: 2, t: rand(0, TAU),
  };
  if (type === 'boss') {
    e.hp = e.maxHp = 45 + wave * 7;
    e.fireT = 1.5;
  } else {
    // Purely multiplicative. There used to be a flat +floor((dwave-8)/5) added before the
    // multiplier, which was the real problem: base mob hp is 1-2, so a flat +3 quadrupled a
    // chaser and *then* got multiplied again. Trash should stay trash; the curve scales the
    // types that start tanky.
    e.hp = Math.max(1, Math.round(e.hp * mobHpMul()));
    e.maxHp = e.hp;
  }
  if (type === 'sniper') e.fireT = rand(1.4, 2.8);
  if (opts) Object.assign(e, opts);
  enemies.push(e);
  return e;
}

const PLUNDER_CARD = { id: 'plunder', name: 'PLUNDER', desc: ['+1000 × multiplier', 'as instant score'], max: 99, color: '#ffe86b' };
function rollChoices() {
  const avail = UPGRADES.filter(u =>
    (player.up[u.id] || 0) < u.max && (u.id !== 'life' || lives < 6));
  if (avail.length < 3) avail.push(PLUNDER_CARD); // pool nearly exhausted
  const out = [];
  while (out.length < 3 && avail.length) {
    let tw = 0;
    for (const u of avail) tw += u.weight || 1;
    let r = Math.random() * tw;
    let taken = avail.length - 1;
    for (let i = 0; i < avail.length; i++) {
      r -= avail[i].weight || 1;
      if (r <= 0) { taken = i; break; }
    }
    out.push(avail.splice(taken, 1)[0]);
  }
  return out;
}
function applyUpgrade(u) {
  player.up[u.id] = (player.up[u.id] || 0) + 1;
  if (u.id === 'life') lives = Math.min(6, lives + 1);
  if (u.id === 'plunder') {
    const b = 1000 * mult;
    score += b;
    addFloater(player.x, player.y - 44, '+' + b.toLocaleString(), '#ffe86b', 16);
  }
  if (u.id === 'shield' && !player.shieldUp) { player.shieldUp = true; player.shieldT = 0; }
  addFloater(player.x, player.y - 26, u.name, u.color, 17);
  SFX.pick();
  choice = null; choiceHover = -1;
  pendingLevels--;
}
function cardRects(n) {
  const cw = 240, chh = 168, gap = 26;
  const total = n * cw + (n - 1) * gap;
  const x0 = W / 2 - total / 2, y0 = H / 2 - chh / 2;
  const rs = [];
  for (let i = 0; i < n; i++) rs.push({ x: x0 + i * (cw + gap), y: y0, w: cw, h: chh });
  return rs;
}

function edgeSpawnPos() {
  const { x0, y0, x1, y1 } = arena;
  for (let i = 0; i < 8; i++) {
    const side = randI(0, 3);
    let x, y;
    if (side === 0)      { x = rand(x0 + 40, x1 - 40); y = y0 + 26; }
    else if (side === 1) { x = rand(x0 + 40, x1 - 40); y = y1 - 26; }
    else if (side === 2) { x = x0 + 26; y = rand(y0 + 40, y1 - 40); }
    else                 { x = x1 - 26; y = rand(y0 + 40, y1 - 40); }
    if (dist2(x, y, player.x, player.y) > 240 * 240) return { x, y };
  }
  return { x: x0 + 30, y: y0 + 30 };
}

function spawnBoss(def, x, y, hpScale) {
  const e = spawnEnemy('boss', x, y);
  e.variant = def.v;
  e.color = def.color;
  const w = dwave();
  e.hp = e.maxHp = bossHp(w, def.hpMul, hpScale);
  e.phase = 'roam'; e.phaseT = 2.2; e.chargeA = 0; e.charges = 0;
  e.spawnCd = 2.5; e.spA = rand(0, TAU); e.orbA = rand(0, TAU);
  e.burstT = 2.5; e.bursting = false;
  e.tpX = x; e.tpY = y; e.phased = false;
  e.fireT = 2;
  if (def.v === 'lancer') e.spin = 3.5;
  if (def.v === 'phantom') { e.phase = 'active'; e.phaseT = 2.6; }
  return e;
}
function updateBoss(e, dt, tx, ty) {
  const dx = tx - e.x, dy = ty - e.y;
  const d = Math.hypot(dx, dy) || 1;
  const v = e.variant || 'sentinel';

  if (v === 'sentinel') {
    const sp = 42;
    e.vx += ((dx / d) * sp - e.vx) * Math.min(1, 1.2 * dt);
    e.vy += ((dy / d) * sp - e.vy) * Math.min(1, 1.2 * dt);
    e.fireT -= dt;
    if (e.fireT <= 0 && player.alive) {
      e.fireT = Math.max(1.0, 2.0 - dwave() * 0.05);
      e.burst = (e.burst || 0) + 1;
      SFX.eShoot();
      if (e.burst % 2 === 0) {
        // twin counter-rotating rings — you have to move through the gaps, not stand in them
        const n = 16, off = rand(0, TAU);
        for (let j = 0; j < n; j++) {
          const a = off + (j / n) * TAU;
          ebullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 175, vy: Math.sin(a) * 175, life: 7, r: 5 });
          const a2 = off - (j / n) * TAU + Math.PI / n;
          ebullets.push({ x: e.x, y: e.y, vx: Math.cos(a2) * 110, vy: Math.sin(a2) * 110, life: 7, r: 5 });
        }
      } else {
        const aim = Math.atan2(dy, dx);
        for (let j = -2; j <= 2; j++) {
          const a = aim + j * 0.15;
          ebullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 265, vy: Math.sin(a) * 265, life: 7, r: 5 });
        }
      }
    }

  } else if (v === 'warden') {
    e.phaseT -= dt;
    if (e.phase === 'roam') {
      e.vx += ((dx / d) * 55 - e.vx) * Math.min(1, 1.2 * dt);
      e.vy += ((dy / d) * 55 - e.vy) * Math.min(1, 1.2 * dt);
      if (e.phaseT <= 0) {
        e.phase = 'aim'; e.phaseT = 0.6;
        e.chargeA = Math.atan2(dy, dx);
        SFX.charge();
      }
    } else if (e.phase === 'aim') {
      e.vx *= Math.exp(-8 * dt); e.vy *= Math.exp(-8 * dt);
      if (e.phaseT <= 0) { e.phase = 'charge'; e.phaseT = 1.6; e.charges++; }
    } else if (e.phase === 'charge') {
      e.vx = Math.cos(e.chargeA) * 610;
      e.vy = Math.sin(e.chargeA) * 610;
      if (Math.random() < dt * 40) addPart(e.x, e.y, rand(-50, 50), rand(-50, 50), 0.3, e.color, 2.5);
      const hitWall =
        (e.x <= arena.x0 + e.r + 10 && e.vx < 0) || (e.x >= arena.x1 - e.r - 10 && e.vx > 0) ||
        (e.y <= arena.y0 + e.r + 10 && e.vy < 0) || (e.y >= arena.y1 - e.r - 10 && e.vy > 0);
      if (hitWall || e.phaseT <= 0) {
        e.phase = 'stun';
        e.phaseT = e.charges % 3 === 0 ? 1.25 : 0.5;
        e.vx = e.vy = 0;
        shake = Math.min(shake + 8, 26);
        shockGrid(e.x, e.y, 260, 380);
        addShockwave(e.x, e.y, 140, e.color);
        // slamming into the wall throws shrapnel — punting the punish window costs you space
        if (player.alive) {
          const off = rand(0, TAU);
          for (let j = 0; j < 8; j++) {
            const a = off + (j / 8) * TAU;
            ebullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 205, vy: Math.sin(a) * 205, life: 5, r: 5 });
          }
        }
        SFX.explode(false);
      }
    } else { // stun
      e.vx *= Math.exp(-6 * dt); e.vy *= Math.exp(-6 * dt);
      if (e.phaseT <= 0) { e.phase = 'roam'; e.phaseT = 1.5; }
    }

  } else if (v === 'hive') {
    const cx = arenaCX() - e.x, cy = arenaCY() - e.y;
    const cd = Math.hypot(cx, cy) || 1;
    e.vx += ((cx / cd) * 30 - e.vx) * Math.min(1, 0.8 * dt);
    e.vy += ((cy / cd) * 30 - e.vy) * Math.min(1, 0.8 * dt);
    e.spawnCd -= dt;
    if (e.spawnCd <= 0 && enemies.length < 45) {
      e.spawnCd = Math.max(1.5, 2.6 - dwave() * 0.05);
      for (let i = 0; i < 3; i++) {
        const a = rand(0, TAU);
        spawnEnemy('shard', e.x + Math.cos(a) * e.r, e.y + Math.sin(a) * e.r,
          { vx: Math.cos(a) * 160, vy: Math.sin(a) * 160 });
      }
      addShockwave(e.x, e.y, e.r * 1.8, e.color);
      SFX.eShoot();
    }
    e.fireT -= dt;
    if (e.fireT <= 0 && player.alive) {
      e.fireT = 2.8;
      const off = rand(0, TAU);
      for (let j = 0; j < 13; j++) {
        const a = off + (j / 13) * TAU;
        ebullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 135, vy: Math.sin(a) * 135, life: 7, r: 5 });
      }
      SFX.eShoot();
    }

  } else if (v === 'lancer') {
    e.orbA += 0.3 * dt;
    const R = Math.min(arena.x1 - arena.x0, arena.y1 - arena.y0) * 0.33;
    const ox = arenaCX() + Math.cos(e.orbA) * R - e.x;
    const oy = arenaCY() + Math.sin(e.orbA) * R - e.y;
    const od = Math.hypot(ox, oy) || 1;
    e.vx += ((ox / od) * 110 - e.vx) * Math.min(1, 1.5 * dt);
    e.vy += ((oy / od) * 110 - e.vy) * Math.min(1, 1.5 * dt);
    e.burstT -= dt;
    if (e.burstT <= 0) {
      e.bursting = !e.bursting;
      e.burstT = e.bursting ? 3.6 : 1.1;
    }
    if (e.bursting && player.alive) {
      e.fireT -= dt;
      if (e.fireT <= 0) {
        e.fireT = 0.13;
        e.spA += 0.38;
        // three arms instead of two — the safe wedge is much tighter
        for (const k of [0, TAU / 3, 2 * TAU / 3]) {
          ebullets.push({
            x: e.x, y: e.y,
            vx: Math.cos(e.spA + k) * 160, vy: Math.sin(e.spA + k) * 160,
            life: 6, r: 5,
          });
        }
      }
    }

  } else if (v === 'phantom') {
    if (e.phase === 'active') {
      e.phased = false;
      e.vx += ((dx / d) * 30 - e.vx) * Math.min(1, dt);
      e.vy += ((dy / d) * 30 - e.vy) * Math.min(1, dt);
      e.fireT -= dt;
      if (e.fireT <= 0 && player.alive) {
        e.fireT = 0.72;
        const aim = Math.atan2(player.y - e.y, player.x - e.x);
        for (const j of [-0.22, 0, 0.22]) {
          ebullets.push({ x: e.x, y: e.y, vx: Math.cos(aim + j) * 250, vy: Math.sin(aim + j) * 250, life: 7, r: 5 });
        }
        SFX.eShoot();
      }
      e.phaseT -= dt;
      if (e.phaseT <= 0) { e.phase = 'fade'; e.phaseT = 0.4; }
    } else if (e.phase === 'fade') {
      e.phased = true;
      e.vx = e.vy = 0;
      e.phaseT -= dt;
      if (e.phaseT <= 0) {
        const a = rand(0, TAU);
        e.tpX = clamp(player.x + Math.cos(a) * 240, arena.x0 + e.r + 20, arena.x1 - e.r - 20);
        e.tpY = clamp(player.y + Math.sin(a) * 240, arena.y0 + e.r + 20, arena.y1 - e.r - 20);
        e.phase = 'tele'; e.phaseT = 0.55;
        SFX.warp();
      }
    } else { // tele
      e.phaseT -= dt;
      if (e.phaseT <= 0) {
        e.x = e.tpX; e.y = e.tpY;
        e.phased = false;
        e.phase = 'active'; e.phaseT = 2.6; e.fireT = 0.6;
        addShockwave(e.x, e.y, 160, e.color);
        shockGrid(e.x, e.y, 260, 340);
        const off = rand(0, TAU);
        for (let j = 0; j < 13; j++) {
          const a = off + (j / 13) * TAU;
          ebullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 200, vy: Math.sin(a) * 200, life: 6, r: 5 });
        }
        SFX.eShoot();
      }
    }
  }
}

// DIRECTOR
