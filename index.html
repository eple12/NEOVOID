function updateDirector(dt) {
  if (victoryT > 0) return; // conquest celebration — no spawns

  if (mode === 'campaign') {
    if (!bossPhase) {
      waveT -= dt;
      if (waveT <= 0) {
        wave++;
        if (wave > planet.waves) {
          bossPhase = true;
          startBossEncounter(planet.boss.map(v => BOSSES.find(b => b.v === v)), 0);
          spawnBossStage('destroy to conquer ' + planet.name);
        } else {
          waveT = 24;
          banner = { txt: 'WAVE ' + wave + ' / ' + planet.waves, sub: null, t: 1.6, max: 1.6, color: planet.color };
          if (wave > 1) SFX.wave();
          burstSpawn();
        }
      }
    } else {
      // boss phase — stages arrive one at a time, each only after the last is cleared
      const bossAlive = liveBosses() > 0;
      if (bossAlive) {
        mopUpT = 3.2; // keeps refreshing while any boss lives
      } else if (bossQueue.length) {
        bossStageT -= dt; // breather between stages
        mopUpT = 3.2;
        if (bossStageT <= 0) spawnBossStage('destroy to conquer ' + planet.name);
      } else {
        mopUpT -= dt; // last boss fell — brief mop-up window, then spawning halts
        if (enemies.length === 0) { planetWin(); return; }
      }
    }
    // spawning: normal waves, or during boss phase only while the mop-up window is open
    if (!bossPhase || mopUpT > 0) {
      spawnT -= dt;
      if (spawnT <= 0) {
        const w = dwave();
        spawnT = ambientGap(w) * (bossPhase ? 1.8 : 1);
        // late planets keep the adds coming through the boss fight instead of going quiet
        const cap = bossPhase ? 7 + planetIdx * 1.5 : Math.min(9 + w * 2.6, 72);
        const batch = ambientBatch(w);
        if (wave >= 1) for (let i = 0; i < batch && enemies.length < cap; i++) ambientSpawn();
      }
    }

  } else { // endless
    waveT -= dt;
    if (waveT <= 0) {
      wave++;
      waveT = Math.max(16, 26 - wave * 0.25);
      // a new encounter only starts once the previous one is fully cleared
      if (wave % bossEvery(wave) === 0 && !bossEncounterBusy()) {
        // walk the shuffled order so an encounter is always distinct bosses, never dupes
        const n = bossCount(wave), defs = [];
        for (let i = 0; i < n; i++) defs.push(BOSSES[bossOrder[(bossIdx + i) % BOSSES.length]]);
        bossIdx += n;
        startBossEncounter(defs, 0);
        spawnBossStage('destroy the core');
      } else {
        banner = { txt: 'WAVE ' + wave, sub: null, t: 1.6, max: 1.6, color: COL.player };
        if (wave > 1) SFX.wave();
      }
      burstSpawn();
      // the void itself grows
      if ((wave === 4 || wave === 8 || wave === 12) && expandStep < 3) {
        expandStep++;
        setArena([0.72, 0.82, 0.91, 1][expandStep], false);
        banner = { txt: 'SECTOR EXPANDED', sub: 'the void grows wider', t: 2.2, max: 2.2, color: COL.gem };
        shockGrid(arenaCX(), arenaCY(), Math.max(W, H) * 0.6, 500);
        SFX.expand();
      }
    }
    // mid-encounter: next stage waits for the current one to be wiped out
    if (bossQueue.length && liveBosses() === 0) {
      bossStageT -= dt;
      if (bossStageT <= 0) spawnBossStage('destroy the core');
    }
    spawnT -= dt;
    if (spawnT <= 0) {
      spawnT = ambientGap(wave);
      const cap = Math.min(9 + wave * 2.4, 68);
      const batch = ambientBatch(wave);
      for (let i = 0; i < batch && enemies.length < cap; i++) ambientSpawn();
    }
  }
}

function planetWin() {
  victoryT = 3.4;
  player.invuln = Math.max(player.invuln, 6);
  const bonus = 5000 * mult;
  score += bonus;
  addFloater(player.x, player.y - 30, '+' + bonus.toLocaleString(), planet.color, 22);
  banner = { txt: planet.name + ' CONQUERED', sub: 'sector secured', t: 3.2, max: 3.2, color: planet.color };
  SFX.victory();
  ebullets.length = 0;
}

// wanderers drift instead of chasing, so they outlive everything else and slowly crowd
// the field out. Hold them to a share of the population rather than letting them stack.
function wandererRoom() {
  let n = 0;
  for (const e of enemies) if (e.type === 'wanderer') n++;
  return Math.max(0, Math.round(6 + enemies.length * 0.15) - n);
}
function ambientSpawn() {
  const w = dwave();
  const pool = ['chaser', 'chaser'];
  if (wandererRoom() > 0) pool.push('wanderer');
  if (w >= 3) pool.push('splitter');
  if (w >= 4) pool.push('dodger', 'chaser');
  if (w >= 6) pool.push('splitter', 'dodger');
  if (w >= 7) pool.push('sniper');
  if (w >= 9) pool.push('hunter', 'sniper');
  if (w >= 12) pool.push('hunter');
  const p = edgeSpawnPos();
  const e = spawnEnemy(pick(pool), p.x, p.y);
  const ec = clamp((w - 6) * 0.035, 0, 0.6);
  if (Math.random() < ec) makeElite(e);
}
function burstSpawn() {
  const kind = wave === 1 ? 0 : randI(0, 2);
  const { x0, y0, x1, y1 } = arena;
  const w = dwave();
  // the wave burst lands on top of ambient spawns — leave headroom so the field stays drawable
  const room = Math.max(0, 95 - enemies.length);
  if (room === 0) return;
  if (kind === 0) {
    // ring around player
    const n = Math.min(3 + Math.round(w * 0.85), 18, room), R = 330;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * TAU;
      const x = clamp(player.x + Math.cos(a) * R, x0 + 30, x1 - 30);
      const y = clamp(player.y + Math.sin(a) * R, y0 + 30, y1 - 30);
      spawnEnemy(w >= 4 && i % 3 === 0 ? 'dodger' : 'chaser', x, y);
    }
  } else if (kind === 1) {
    // advancing wall — was solid wanderers, which is what buried THE CORE in squares.
    // Only the share the field has room for stays a wanderer; the rest push forward.
    const n = Math.min(3 + Math.round(w * 0.7), 14, room), top = Math.random() < 0.5;
    let wr = wandererRoom();
    for (let i = 0; i < n; i++) {
      let t = 'chaser';
      if (wr > 0 && i % 2 === 0) { t = 'wanderer'; wr--; }
      else if (w >= 6 && i % 3 === 1) t = 'dodger';
      spawnEnemy(t, x0 + (i + 0.5) / n * (x1 - x0), top ? y0 + 40 : y1 - 40);
    }
  } else {
    // corner splitter pods
    const cs = [[x0 + 50, y0 + 50], [x1 - 50, y0 + 50], [x0 + 50, y1 - 50], [x1 - 50, y1 - 50]];
    for (const c of cs) spawnEnemy('splitter', c[0], c[1]);
  }
}

// ============================================================
// COMBAT
// ============================================================
function fireBullet() {
  const a = player.ang;
  const n = stat.streams(), dmg = stat.dmg(), pierce = stat.pierce();
  player.side *= -1;
  const px = Math.cos(a + Math.PI / 2) * 5 * player.side;
  const py = Math.sin(a + Math.PI / 2) * 5 * player.side;
  for (let i = 0; i < n; i++) {
    const fan = (i - (n - 1) / 2) * 0.085;
    const spread = fan + rand(-0.024, 0.024);
    bullets.push({
      x: player.x + Math.cos(a) * 14 + px,
      y: player.y + Math.sin(a) * 14 + py,
      vx: Math.cos(a + spread) * 760,
      vy: Math.sin(a + spread) * 760,
      life: 1.4, dmg, pierce, hits: [],
      bounce: player.up.ricochet || 0,
    });
  }
  // recoil + muzzle
  player.vx -= Math.cos(a) * 14;
  player.vy -= Math.sin(a) * 14;
  addPart(player.x + Math.cos(a) * 16, player.y + Math.sin(a) * 16,
    Math.cos(a) * 120 + rand(-40, 40), Math.sin(a) * 120 + rand(-40, 40),
    0.12, COL.bullet, 2);
  shockGrid(player.x + Math.cos(a) * 20, player.y + Math.sin(a) * 20, 60, 26);
  SFX.shoot();
}

function fireNova(x, y) {
  const dmg = stat.dmg();
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * TAU + rand(-0.1, 0.1);
    bullets.push({ x, y, vx: Math.cos(a) * 620, vy: Math.sin(a) * 620, life: 0.7, dmg, pierce: 0, hits: [], bounce: 0 });
  }
  addShockwave(x, y, 90, COL.bullet);
  SFX.nova();
}

function addBolt(x1, y1, x2, y2) {
  const pts = [{ x: x1, y: y1 }];
  const n = 5, sx = (x2 - x1) / n, sy = (y2 - y1) / n;
  let px = -(y2 - y1), py = x2 - x1;
  const L = Math.hypot(px, py) || 1;
  px /= L; py /= L;
  for (let i = 1; i < n; i++) {
    const off = rand(-14, 14);
    pts.push({ x: x1 + sx * i + px * off, y: y1 + sy * i + py * off });
  }
  pts.push({ x: x2, y: y2 });
  bolts.push({ pts, life: 0.16, max: 0.16 });
}

let inChain = false;
function killEnemy(e, silent) {
  const big = e.type === 'boss';
  addExplosion(e.x, e.y, e.color, big ? 90 : Math.floor(e.r * 1.6), big ? 480 : 260);
  addShockwave(e.x, e.y, big ? 220 : e.r * 4.5, e.color);
  shockGrid(e.x, e.y, big ? 420 : e.r * 10, big ? 620 : e.r * 12);
  shake = Math.min(shake + (big ? 22 : 3.5), 26);
  SFX.explode(big);
  if (mode === 'tutorial' && tut) tut.kills++;
  if (!silent) {
    const pts = e.score * mult;
    score += pts;
    addFloater(e.x, e.y - e.r, '+' + pts.toLocaleString(), '#fff', big ? 24 : 14);
    for (let i = 0; i < e.gems; i++) {
      const a = rand(0, TAU), sp = rand(40, big ? 220 : 130);
      gems.push({ x: e.x, y: e.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 8 });
    }
    if (e.type === 'splitter') {
      for (let i = 0; i < 2; i++) {
        const a = rand(0, TAU);
        spawnEnemy('shard', e.x + Math.cos(a) * 12, e.y + Math.sin(a) * 12,
          { vx: Math.cos(a) * 180, vy: Math.sin(a) * 180 });
      }
    }
    if (big) {
      hitStop = Math.max(hitStop, 0.1);
      hearts.push({ x: e.x, y: e.y, vx: rand(-40, 40), vy: rand(-40, 40), life: 20 });
    }
    // ARC CONDUIT: chain lightning off every kill
    if (player.up.chain && !inChain) {
      inChain = true;
      let jumps = player.up.chain + 1;
      let cx = e.x, cy = e.y;
      const hitSet = new Set();
      while (jumps-- > 0) {
        let best = null, bd = 190 * 190;
        for (const t of enemies) {
          if (t.spawnT > 0 || t.phased || hitSet.has(t)) continue;
          const d2 = dist2(cx, cy, t.x, t.y);
          if (d2 < bd) { bd = d2; best = t; }
        }
        if (!best) break;
        addBolt(cx, cy, best.x, best.y);
        hitSet.add(best);
        best.hp -= 2;
        best.flash = 0.1;
        SFX.zap();
        cx = best.x; cy = best.y;
        if (best.hp <= 0) killEnemy(best);
      }
      inChain = false;
    }
    // extra life
    if (score >= nextLifeAt) {
      nextLifeAt = Math.floor(nextLifeAt * 2.2);
      if (lives < 6) {
        lives++;
        addFloater(player.x, player.y - 30, '1UP', '#7dff8e', 26);
        SFX.oneUp();
      }
    }
  }
  const idx = enemies.indexOf(e);
  if (idx >= 0) enemies.splice(idx, 1);
}

function playerDie() {
  if (mode === 'tutorial') return; // no death in the tutorial
  if (!player.alive || player.invuln > 0 || player.dashT > 0) return;
  if (player.shieldUp) {
    // AEGIS SHELL absorbs the hit
    player.shieldUp = false;
    player.shieldT = stat.shieldRecharge();
    player.invuln = 1.2;
    addShockwave(player.x, player.y, 180, '#7db8ff');
    shockGrid(player.x, player.y, 300, 420);
    shake = Math.min(shake + 10, 26);
    SFX.shieldBreak();
    for (const e of enemies) {
      const d = Math.hypot(e.x - player.x, e.y - player.y) || 1;
      if (d < 200) { e.vx += (e.x - player.x) / d * 500; e.vy += (e.y - player.y) / d * 500; }
    }
    return;
  }
  lives--;
  player.alive = false;
  player.respawnT = 1.3;
  mult = 1; gemStreak = 0;
  hitStop = 0.22; shake = 26; flashT = 0.18;
  addExplosion(player.x, player.y, COL.player, 90, 520);
  addExplosion(player.x, player.y, '#ffffff', 40, 340);
  addShockwave(player.x, player.y, 320, COL.player);
  shockGrid(player.x, player.y, 500, 800);
  SFX.death();
  // clear nearby threats + all enemy bullets
  ebullets.length = 0;
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.type !== 'boss' && dist2(e.x, e.y, player.x, player.y) < 280 * 280) {
      addExplosion(e.x, e.y, e.color, 10, 200);
      enemies.splice(i, 1);
    }
  }
  if (lives <= 0) {
    state = S_OVER;
    overHover = -1;
    overT = 0; overScore = 0;
    newBest = mode === 'endless' && score > best;
    if (newBest) { best = score; localStorage.setItem('neovoid_best', best); }
  }
}

// soft aim assist for keyboard (arrow-key) aiming
function assistAim(a) {
  let bestDa = 0.36, bestA = null;
  for (const e of enemies) {
    if (e.spawnT > 0 || e.phased) continue;
    if (dist2(player.x, player.y, e.x, e.y) > 700 * 700) continue;
    const ea = Math.atan2(e.y - player.y, e.x - player.x);
    let da = ea - a;
    while (da > Math.PI) da -= TAU;
    while (da < -Math.PI) da += TAU;
    if (Math.abs(da) < bestDa) { bestDa = Math.abs(da); bestA = ea; }
  }
  return bestA === null ? a : bestA;
}

function chargeOverdrive(amt) {
  if (odActive > 0) return;
  if (odCool > 0) amt *= OD_COOL_RATE; // sweeping up your own kill's gems shouldn't refund the ultimate
  const was = odCharge;
  odCharge = Math.min(OD_MAX, odCharge + amt);
  if (was < OD_MAX && odCharge >= OD_MAX) { odReadyPulse = 1; SFX.odReady(); }
}
function activateOverdrive() {
  if (state !== S_PLAY || !player.alive || odActive > 0 || odCharge < OD_MAX) return;
  odCharge = 0; odActive = OD_DUR; odFlash = 0.25;
  player.invuln = Math.max(player.invuln, OD_IFRAMES);
  shake = Math.min(shake + 14, 26);
  addShockwave(player.x, player.y, 260, COL.gem);
  addShockwave(player.x, player.y, 180, '#ffffff');
  shockGrid(player.x, player.y, 460, 620);
  // clear point-blank fire only — distant walls still close in, so OD buys space, not a reset
  for (let i = ebullets.length - 1; i >= 0; i--) {
    if (dist2(ebullets[i].x, ebullets[i].y, player.x, player.y) < 330 * 330) ebullets.splice(i, 1);
  }
  for (let i = 0; i < 40; i++) { const a = (i / 40) * TAU; addPart(player.x, player.y, Math.cos(a) * 380, Math.sin(a) * 380, 0.5, COL.gem, 2.5); }
  SFX.odOn();
}

function tryDash() {
  if (state !== S_PLAY || !player.alive || player.dashCd > 0) return;
  let dx = 0, dy = 0;
  if (keys.KeyW) dy -= 1;
  if (keys.KeyS) dy += 1;
  if (keys.KeyA) dx -= 1;
  if (keys.KeyD) dx += 1;
  if (isTouch && stickL.id !== -1) { dx = stickL.dx; dy = stickL.dy; }
  const len = Math.hypot(dx, dy);
  if (len < 0.01) { dx = Math.cos(player.ang); dy = Math.sin(player.ang); }
  else { dx /= len; dy /= len; }
  player.dashT = stat.dashDur(); player.dashCd = stat.dashCdMax();
  player.dashX = dx; player.dashY = dy;
  addShockwave(player.x, player.y, 70, COL.player);
  shockGrid(player.x, player.y, 160, 180);
  SFX.dash();
  // HOLO DECOY: leave a lure behind
  if (player.up.decoy) {
    const dl = 1.8 + 0.9 * player.up.decoy;
    decoys.push({ x: player.x, y: player.y, life: dl, max: dl });
  }
  // RAM FIELD: dash detonation
  if (player.up.shock) {
    addShockwave(player.x, player.y, 150, COL.chaser);
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e || e.spawnT > 0 || e.phased) continue;
      if (dist2(e.x, e.y, player.x, player.y) < 140 * 140) {
        e.hp -= 3; e.flash = 0.1;
        const ka = Math.atan2(e.y - player.y, e.x - player.x);
        e.vx += Math.cos(ka) * 420; e.vy += Math.sin(ka) * 420;
        if (e.hp <= 0) killEnemy(e);
      }
    }
  }
}

// ============================================================
// RESET / START
// ============================================================
function startGame(m, pIdx) {
  mode = m || 'endless';
  planetIdx = pIdx || 0;
  planet = mode === 'campaign' ? PLANETS[planetIdx] : null;
  bossPhase = false; victoryT = 0; expandStep = 0; mopUpT = -1;
  bossQueue = []; bossStageT = 0; bossStageNo = 0; bossStageTotal = 0;
  setArena(mode === 'campaign' ? planet.size : 0.72, true);
  score = 0; mult = 1; lives = 3; nextLifeAt = 20000;
  wave = 0; waveT = mode === 'campaign' ? 3 : 0.01; spawnT = 2.2; gameT = 0;
  gemStreak = 0; shake = 0; hitStop = 0;
  level = 1; xp = 0; xpNeed = 10; pendingLevels = 0; xpShown = 0; xpFlash = 0;
  odCharge = 0; odActive = 0; odFlash = 0; odReadyPulse = 0; odCool = 0;
  choice = null; choiceHover = -1;
  bullets = []; enemies = []; ebullets = []; gems = []; hearts = [];
  parts = []; floaters = []; shockwaves = []; ghosts = [];
  decoys = []; bolts = [];
  bossOrder = shuffle([0, 1, 2, 3, 4]); bossIdx = 0;
  player.up = {}; player.shieldUp = false; player.shieldT = 0;
  player.x = arenaCX(); player.y = arenaCY();
  player.vx = player.vy = 0;
  player.alive = true; player.invuln = 2;
  player.dashT = 0; player.dashCd = 0; player.fireCd = 0;
  banner = null; paused = false;
  state = S_PLAY;
}

// ============================================================
// UPDATE
// ============================================================
function update(dt, raw) {
  sfxExpl = 0;
  updateGrid(dt);
  updateArena(dt);
  updateSpace(raw, state === S_MENU || state === S_GALAXY || state === S_END || state === S_STORY);

  // fx that always run
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.life -= dt;
    if (p.life <= 0) { parts.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= Math.exp(-2.5 * dt); p.vy *= Math.exp(-2.5 * dt);
  }
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.life -= dt;
    if (s.life <= 0) { shockwaves.splice(i, 1); continue; }
    s.r = lerp(s.maxR, 8, s.life / s.max);
  }
  for (let i = bolts.length - 1; i >= 0; i--) {
    bolts[i].life -= dt;
    if (bolts[i].life <= 0) bolts.splice(i, 1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.life -= raw;
    f.y -= 34 * raw;
    if (f.life <= 0) floaters.splice(i, 1);
  }
  for (let i = ghosts.length - 1; i >= 0; i--) {
    ghosts[i].life -= raw;
    if (ghosts[i].life <= 0) ghosts.splice(i, 1);
  }
  if (banner) { banner.t -= raw; if (banner.t <= 0) banner = null; }
  shake = Math.max(0, shake - 60 * raw);
  flashT = Math.max(0, flashT - raw);
  multPulse = Math.max(0, multPulse - raw * 3);
  if (gemStreakT > 0) { gemStreakT -= raw; if (gemStreakT <= 0) gemStreak = 0; }
  // xp bar + overdrive meter animation (always eases, even while paused/leveling)
  xpShown += (clamp(xp / xpNeed, 0, 1) - xpShown) * Math.min(1, 10 * raw);
  xpFlash = Math.max(0, xpFlash - raw * 1.6);
  odFlash = Math.max(0, odFlash - raw * 2);
  odReadyPulse = Math.max(0, odReadyPulse - raw * 1.2);

  if (state !== S_PLAY) bossActive = false; // drop the boss theme outside combat

  if (state === S_STORY) {
    storyT += raw;
    if (Math.random() < dt * 2)
      addPart(rand(0, W), H + 8, rand(-8, 8), rand(-40, -14), rand(2, 4), pick([COL.chaser, COL.gem, COL.wanderer]), 1.6);
    return;
  }
  if (state === S_MENU || state === S_GALAXY || state === S_END) {
    if (Math.random() < dt * 0.7) shockGrid(rand(0, W), rand(0, H), rand(120, 280), rand(80, 220));
    if (Math.random() < dt * 3)
      addPart(rand(0, W), H + 8, rand(-8, 8), rand(-40, -14), rand(2, 4), pick([COL.chaser, COL.gem, COL.wanderer]), 1.6);
    if (state === S_END && Math.random() < dt * 3)
      addExplosion(rand(W * 0.15, W * 0.85), rand(H * 0.15, H * 0.6), pick(['#ffe86b', '#3ff0ff', '#ff3fa4', '#ffffff']), 20, 240);
    return;
  }
  if (state === S_OVER) {
    overT += raw;
    overScore = Math.min(score, Math.floor(overScore + Math.max(score * raw / 1.2, 1)));
    return;
  }
  if (paused) return;

  // conquest celebration
  if (victoryT > 0) {
    victoryT -= dt;
    if (Math.random() < dt * 9)
      addExplosion(rand(arena.x0 + 60, arena.x1 - 60), rand(arena.y0 + 60, arena.y1 - 60),
        pick([planet.color, COL.gem, COL.bullet, '#ffffff']), 24, 260);
    if (victoryT <= 0) {
      conquered[planetIdx] = true;
      localStorage.setItem('neovoid_conquered', JSON.stringify(conquered));
      let all = true;
      for (let i = 0; i < PLANETS.length; i++) if (!conquered[i]) { all = false; break; }
      galaxyHover = -1;
      setArena(1, true);
      if (all) { epilogueReplay = false; startStory(false, ENDING); } // the galaxy is yours — play it out
      else state = S_GALAXY;
      return;
    }
  }

  // level-up modal: freeze the world while choosing
  if (choice) return;
  if (pendingLevels > 0 && player.alive && victoryT <= 0) {
    choice = rollChoices();
    if (choice.length) { choiceHover = 0; SFX.levelup(); return; }
    choice = null; pendingLevels = 0;
  }

  gameT += dt;
  // a live boss on the field swings the soundtrack into its menacing variant
  bossActive = enemies.some(e => e.type === 'boss');
  if (odActive > 0) {
    odActive = Math.max(0, odActive - dt);
    if (player.alive && Math.random() < dt * 40)
      addPart(player.x + rand(-14, 14), player.y + rand(-14, 14), rand(-60, 60), rand(-60, 60), 0.4, COL.gem, 2);
    if (odActive === 0) { odFlash = 0.2; odCool = OD_COOL; SFX.odOff(); }
  } else if (odCool > 0) odCool = Math.max(0, odCool - dt);
  if (mode === 'tutorial') updateTutorial(dt);
  else updateDirector(dt);

  // ---------- player ----------
  if (player.alive) {
    let mx = 0, my = 0;
    if (keys.KeyW) my -= 1;
    if (keys.KeyS) my += 1;
    if (keys.KeyA) mx -= 1;
    if (keys.KeyD) mx += 1;
    if (isTouch && stickL.id !== -1) { mx = stickL.dx; my = stickL.dy; }
    const ml = Math.hypot(mx, my);
    if (ml > 1) { mx /= ml; my /= ml; }

    player.dashCd = Math.max(0, player.dashCd - dt);
    if (player.dashT > 0) {
      player.dashT -= dt;
      player.vx = player.dashX * 1250;
      player.vy = player.dashY * 1250;
      ghosts.push({ x: player.x, y: player.y, ang: player.ang, life: 0.25, max: 0.25 });
      addPart(player.x, player.y, rand(-60, 60), rand(-60, 60), 0.3, COL.player, 2);
    } else {
      const ACC = stat.accel(), FRIC = 7.5;
      player.vx += mx * ACC * dt;
      player.vy += my * ACC * dt;
      const fr = Math.exp(-FRIC * dt);
      player.vx *= fr; player.vy *= fr;
    }
    player.x = clamp(player.x + player.vx * dt, arena.x0 + 14, arena.x1 - 14);
    player.y = clamp(player.y + player.vy * dt, arena.y0 + 14, arena.y1 - 14);

    // engine trail
    if (ml > 0.1 && Math.random() < dt * 60) {
      const ba = Math.atan2(player.vy, player.vx) + Math.PI;
      addPart(player.x + Math.cos(ba) * 10, player.y + Math.sin(ba) * 10,
        Math.cos(ba) * 90 + rand(-30, 30), Math.sin(ba) * 90 + rand(-30, 30),
        0.35, COL.player, 1.8);
    }

    // aim — mouse, or arrow keys for keyboard-only play
    let aiming = false;
    const akx = (keys.ArrowRight ? 1 : 0) - (keys.ArrowLeft ? 1 : 0);
    const aky = (keys.ArrowDown ? 1 : 0) - (keys.ArrowUp ? 1 : 0);
    if (isTouch) {
      if (stickR.id !== -1 && Math.hypot(stickR.dx, stickR.dy) > 0.25) {
        player.ang = Math.atan2(stickR.dy, stickR.dx);
        aiming = true;
      }
    } else if (akx || aky) {
      aimDevice = 'keys';
      player.ang = assistAim(Math.atan2(aky, akx));
      aiming = true;
    } else if (aimDevice === 'mouse') {
      player.ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
      aiming = mouse.down;
    }

    // fire
    player.fireCd -= dt;
    if (aiming && player.fireCd <= 0) {
      player.fireCd = stat.fireInt();
      fireBullet();
    }

    // shield recharge
    if ((player.up.shield || 0) > 0 && !player.shieldUp) {
      player.shieldT -= dt;
      if (player.shieldT <= 0) { player.shieldUp = true; SFX.shieldOn(); }
    }

    // orbital blades
    const nOrbs = stat.orbs();
    for (let k = 0; k < nOrbs; k++) {
      const oa = gameT * 2.9 + (k / nOrbs) * TAU;
      const ox = player.x + Math.cos(oa) * 64, oy = player.y + Math.sin(oa) * 64;
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (!e || e.spawnT > 0 || e.phased || (e.orbCd || 0) > 0) continue;
        if (dist2(ox, oy, e.x, e.y) < (e.r + 9) * (e.r + 9)) {
          e.hp -= 2; e.flash = 0.1; e.orbCd = 0.4;
          const ka = Math.atan2(e.y - oy, e.x - ox);
          e.vx += Math.cos(ka) * 240; e.vy += Math.sin(ka) * 240;
          addPart(ox, oy, Math.cos(ka) * 160, Math.sin(ka) * 160, 0.25, COL.wanderer, 2);
          if (e.hp <= 0) killEnemy(e);
          else SFX.hit();
        }
      }
    }

    player.invuln = Math.max(0, player.invuln - dt);
  } else {
    player.respawnT -= dt;
    if (player.respawnT <= 0 && lives > 0) {
      player.alive = true;
      player.x = arenaCX(); player.y = arenaCY();
      player.vx = player.vy = 0;
      player.invuln = 2.5;
      addShockwave(player.x, player.y, 140, COL.player);
      shockGrid(player.x, player.y, 260, -320); // implosion pull
    }
  }

  // ---------- bullets ----------
  const hom = stat.homing();
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life -= dt;
    if (hom > 0 && enemies.length) {
      let bestD = 240 * 240, tgt = null;
      for (const e of enemies) {
        if (e.spawnT > 0 || e.phased) continue;
        const d2 = dist2(b.x, b.y, e.x, e.y);
        if (d2 < bestD) { bestD = d2; tgt = e; }
      }
      if (tgt) {
        const sp = Math.hypot(b.vx, b.vy);
        const cur = Math.atan2(b.vy, b.vx);
        let da = Math.atan2(tgt.y - b.y, tgt.x - b.x) - cur;
        while (da > Math.PI) da -= TAU;
        while (da < -Math.PI) da += TAU;
        const turn = clamp(da, -hom * dt, hom * dt);
        b.vx = Math.cos(cur + turn) * sp;
        b.vy = Math.sin(cur + turn) * sp;
      }
    }
    b.x += b.vx * dt; b.y += b.vy * dt;
    const bx0 = arena.x0 + 4, bx1 = arena.x1 - 4, by0 = arena.y0 + 4, by1 = arena.y1 - 4;
    let hitWall = b.x < bx0 || b.x > bx1 || b.y < by0 || b.y > by1;
    if (hitWall && b.bounce > 0) {
      // RICOCHET
      b.bounce--;
      if (b.x < bx0) { b.x = bx0; b.vx = Math.abs(b.vx); }
      else if (b.x > bx1) { b.x = bx1; b.vx = -Math.abs(b.vx); }
      if (b.y < by0) { b.y = by0; b.vy = Math.abs(b.vy); }
      else if (b.y > by1) { b.y = by1; b.vy = -Math.abs(b.vy); }
      addPart(b.x, b.y, rand(-60, 60), rand(-60, 60), 0.15, '#ffd166', 1.6);
      hitWall = false;
    }
    if (b.life <= 0 || hitWall) {
      addPart(b.x, b.y, -b.vx * 0.06 + rand(-40, 40), -b.vy * 0.06 + rand(-40, 40), 0.2, COL.bullet, 1.6);
      shockGrid(b.x, b.y, 50, 40);
      bullets.splice(i, 1);
    }
  }

  // ---------- holo decoys ----------
  for (let i = decoys.length - 1; i >= 0; i--) {
    const dc = decoys[i];
    dc.life -= dt;
    if (dc.life <= 0) {
      decoys.splice(i, 1);
      addExplosion(dc.x, dc.y, COL.player, 26, 300);
      addShockwave(dc.x, dc.y, 130, COL.player);
      shockGrid(dc.x, dc.y, 220, 300);
      SFX.explode(false);
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (!e || e.spawnT > 0 || e.phased) continue;
        if (dist2(e.x, e.y, dc.x, dc.y) < 130 * 130) {
          e.hp -= 3; e.flash = 0.12;
          if (e.hp <= 0) killEnemy(e);
        }
      }
    }
  }

  // ---------- enemies ----------
  const stasS = stat.stasis();
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e) continue; // index can go stale after chained kills
    e.t += dt;
    e.flash = Math.max(0, e.flash - dt);
    if (e.orbCd) e.orbCd -= dt;
    if (e.spawnT > 0) { e.spawnT -= dt; continue; }
    e.ang += e.spin * dt;

    // target: nearest holo decoy lures instead of the player
    let tx = player.x, ty = player.y;
    if (decoys.length) {
      let bd = Infinity;
      for (const dc of decoys) {
        const dd = dist2(e.x, e.y, dc.x, dc.y);
        if (dd < bd) { bd = dd; tx = dc.x; ty = dc.y; }
      }
    }
    const dx = tx - e.x, dy = ty - e.y;
    const d = Math.hypot(dx, dy) || 1;

    if (e.type === 'chaser' || e.type === 'shard') {
      const sp = (e.type === 'shard' ? 230 : Math.min(110 + dwave() * 5, 235)) * (e.spdMul || 1);
      const acc = e.type === 'shard' ? 5 : 3;
      e.vx += ((dx / d) * sp - e.vx) * Math.min(1, acc * dt);
      e.vy += ((dy / d) * sp - e.vy) * Math.min(1, acc * dt);
    } else if (e.type === 'sniper') {
      // keeps its distance and takes aimed shots
      const desired = 340;
      const dir = d > desired + 40 ? 1 : d < desired - 40 ? -1 : 0;
      const sp = 130 * (e.spdMul || 1);
      e.vx += ((dx / d) * sp * dir - e.vx) * Math.min(1, 2.5 * dt);
      e.vy += ((dy / d) * sp * dir - e.vy) * Math.min(1, 2.5 * dt);
      e.ang = Math.atan2(dy, dx);
      e.fireT -= dt;
      if (e.fireT <= 0 && player.alive) {
        e.fireT = 2.8;
        const aim = Math.atan2(dy, dx);
        ebullets.push({ x: e.x, y: e.y, vx: Math.cos(aim) * 270, vy: Math.sin(aim) * 270, life: 5, r: 4 });
        addPart(e.x + Math.cos(aim) * e.r, e.y + Math.sin(aim) * e.r, Math.cos(aim) * 100, Math.sin(aim) * 100, 0.15, e.color, 2);
        SFX.eShoot();
      }
    } else if (e.type === 'hunter') {
      // blinks toward its prey
      const sp = 90 * (e.spdMul || 1);
      e.vx += ((dx / d) * sp - e.vx) * Math.min(1, 2 * dt);
      e.vy += ((dy / d) * sp - e.vy) * Math.min(1, 2 * dt);
      e.fireT -= dt;
      if (e.fireT <= 0 && d > 70) {
        e.fireT = 2.2;
        addPart(e.x, e.y, rand(-80, 80), rand(-80, 80), 0.3, e.color, 2.5);
        const hop = Math.min(140, d - 50);
        e.x = clamp(e.x + (dx / d) * hop, arena.x0 + e.r, arena.x1 - e.r);
        e.y = clamp(e.y + (dy / d) * hop, arena.y0 + e.r, arena.y1 - e.r);
        addShockwave(e.x, e.y, 42, e.color);
      }
    } else if (e.type === 'wanderer') {
      if (Math.abs(e.vx) < 5 && Math.abs(e.vy) < 5) {
        const a = rand(0, TAU), s0 = WANDER_SPD * (e.spdMul || 1);
        e.vx = Math.cos(a) * s0; e.vy = Math.sin(a) * s0;
      }
      // movement clamps position to the wall, so the old strict `<` never fired and
      // wanderers pinned themselves into corners forever — test against the clamp itself
      if (e.x <= arena.x0 + e.r && e.vx < 0) { e.vx = Math.abs(e.vx); e.x = arena.x0 + e.r + 1; }
      if (e.x >= arena.x1 - e.r && e.vx > 0) { e.vx = -Math.abs(e.vx); e.x = arena.x1 - e.r - 1; }
      if (e.y <= arena.y0 + e.r && e.vy < 0) { e.vy = Math.abs(e.vy); e.y = arena.y0 + e.r + 1; }
      if (e.y >= arena.y1 - e.r && e.vy > 0) { e.vy = -Math.abs(e.vy); e.y = arena.y1 - e.r - 1; }
      // a perfectly axis-aligned bounce can still retrace the same line — jitter the heading
      if (e.bounceT === undefined) e.bounceT = 0;
      e.bounceT -= dt;
      if (e.bounceT <= 0 &&
          (e.x <= arena.x0 + e.r + 2 || e.x >= arena.x1 - e.r - 2 ||
           e.y <= arena.y0 + e.r + 2 || e.y >= arena.y1 - e.r - 2)) {
        e.bounceT = 0.35;
        const sp = Math.hypot(e.vx, e.vy) || WANDER_SPD * (e.spdMul || 1);
        const na = Math.atan2(e.vy, e.vx) + rand(-0.5, 0.5);
        e.vx = Math.cos(na) * sp; e.vy = Math.sin(na) * sp;
      }
      // every other type steers toward a target speed, so knockback washes out. Wanderers
      // just keep whatever velocity they have, so sustained fire was compounding them up
      // past 350 — let the shove land, then bleed it back to cruising speed.
      const wcap = WANDER_SPD * (e.spdMul || 1);
      const wsp = Math.hypot(e.vx, e.vy);
      if (wsp > wcap) {
        const k = Math.max(wcap, wsp * Math.exp(-2.5 * dt));
        e.vx = e.vx / wsp * k; e.vy = e.vy / wsp * k;
      }
    } else if (e.type === 'splitter') {
      const sp = 72 * (e.spdMul || 1);
      e.vx += ((dx / d) * sp - e.vx) * Math.min(1, 2 * dt);
      e.vy += ((dy / d) * sp - e.vy) * Math.min(1, 2 * dt);
    } else if (e.type === 'dodger') {
      const dsp = 165 * (e.spdMul || 1);
      let ax = (dx / d) * dsp, ay = (dy / d) * dsp;
      // dodge incoming bullets
      for (const b of bullets) {
        const bdx = e.x - b.x, bdy = e.y - b.y;
        const bd2 = bdx * bdx + bdy * bdy;
        if (bd2 < 130 * 130) {
          const dot = b.vx * bdx + b.vy * bdy;
          if (dot > 0) { // heading toward us
            const bl = Math.hypot(b.vx, b.vy) || 1;
            // steer perpendicular to bullet path
            const px = -b.vy / bl, py = b.vx / bl;
            const sgn = (px * bdx + py * bdy) > 0 ? 1 : -1;
            ax += px * sgn * 620; ay += py * sgn * 620;
          }
        }
      }
      e.vx += (ax - e.vx) * Math.min(1, 4.5 * dt);
      e.vy += (ay - e.vy) * Math.min(1, 4.5 * dt);
    } else if (e.type === 'boss') {
      updateBoss(e, dt, tx, ty);
    }
    // stasis field slows nearby enemies; overdrive slows everything
    let sf = odActive > 0 ? 0.72 : 1;
    if (stasS > 0 && dist2(e.x, e.y, player.x, player.y) < 170 * 170) sf = Math.min(sf, 1 - stasS);
    e.x = clamp(e.x + e.vx * dt * sf, arena.x0 + e.r, arena.x1 - e.r);
    e.y = clamp(e.y + e.vy * dt * sf, arena.y0 + e.r, arena.y1 - e.r);

    // vs bullets
    if (!e.phased)
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (b.hits.length && b.hits.includes(e)) continue;
      if (dist2(b.x, b.y, e.x, e.y) < (e.r + 4) * (e.r + 4)) {
        if (b.pierce > 0) { b.pierce--; b.hits.push(e); }
        else bullets.splice(j, 1);
        e.hp -= b.dmg;
        e.flash = 0.08;
        e.vx += b.vx * 0.045; e.vy += b.vy * 0.045;
        // bosses charge OD at a reduced rate so they can't fund the ultimate that kills them
        chargeOverdrive(0.38 * b.dmg * (e.type === 'boss' ? 0.45 : 1));
        addPart(b.x, b.y, -b.vx * 0.1 + rand(-60, 60), -b.vy * 0.1 + rand(-60, 60), 0.22, e.color, 2);
        if (e.hp <= 0) { killEnemy(e); break; }
        else SFX.hit();
      }
    }
    // vs player
    if (!e.phased && player.alive && enemies.includes(e) &&
        dist2(e.x, e.y, player.x, player.y) < (e.r + player.r - 2) * (e.r + player.r - 2)) {
      if (player.dashT > 0 && player.up.shock) {
        if ((e.orbCd || 0) <= 0) {
          e.hp -= 3; e.flash = 0.1; e.orbCd = 0.3;
          const ka = Math.atan2(e.y - player.y, e.x - player.x);
          e.vx += Math.cos(ka) * 420; e.vy += Math.sin(ka) * 420;
          addPart(e.x, e.y, Math.cos(ka) * 200, Math.sin(ka) * 200, 0.25, COL.chaser, 2.5);
          if (e.hp <= 0) killEnemy(e);
          else SFX.hit();
        }
      } else if (player.invuln <= 0 && player.dashT <= 0) playerDie();
    }
  }

  // ---------- enemy bullets ----------
  const stasB = stat.stasis();
  for (let i = ebullets.length - 1; i >= 0; i--) {
    const b = ebullets[i];
    if (!b) continue; // playerDie() can clear the array mid-loop
    b.life -= dt;
    let bf = odActive > 0 ? 0.72 : 1;
    if (stasB > 0 && dist2(b.x, b.y, player.x, player.y) < 170 * 170) bf = Math.min(bf, 1 - stasB);
    b.x += b.vx * dt * bf; b.y += b.vy * dt * bf;
    if (b.life <= 0 || b.x < arena.x0 || b.x > arena.x1 || b.y < arena.y0 || b.y > arena.y1) { ebullets.splice(i, 1); continue; }
    if (player.alive && player.invuln <= 0 && player.dashT <= 0 &&
        dist2(b.x, b.y, player.x, player.y) < (b.r + player.r - 2) * (b.r + player.r - 2)) {
      ebullets.splice(i, 1);
      playerDie();
    }
  }

  // ---------- gems ----------
  for (let i = gems.length - 1; i >= 0; i--) {
    const g = gems[i];
    g.life -= dt;
    if (g.life <= 0) { gems.splice(i, 1); continue; }
    const dx = player.x - g.x, dy = player.y - g.y;
    const d = Math.hypot(dx, dy) || 1;
    const mr = stat.magnetR();
    if (player.alive && d < mr) {
      const pull = (1 - d / mr) * 2400;
      g.vx += (dx / d) * pull * dt;
      g.vy += (dy / d) * pull * dt;
    }
    const fr = Math.exp(-1.8 * dt);
    g.vx *= fr; g.vy *= fr;
    g.x += g.vx * dt; g.y += g.vy * dt;
    if (player.alive && d < 18) {
      gems.splice(i, 1);
      mult++;
      multPulse = 1;
      gemStreak++; gemStreakT = 0.9;
      xp++;
      while (xp >= xpNeed) { xp -= xpNeed; level++; pendingLevels++; xpFlash = 1; xpShown = 0; xpNeed = Math.round(10 + (level - 1) * 9 + (level - 1) * (level - 1) * 0.6); }
      chargeOverdrive(0.9);
      if (player.up.nova && Math.random() < 0.10 * player.up.nova) fireNova(player.x, player.y);
      SFX.gem(gemStreak);
      addPart(g.x, g.y, rand(-50, 50), rand(-50, 50), 0.25, COL.gem, 2);
    }
  }

  // ---------- hearts (life pickups) ----------
  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i];
    h.life -= dt;
    if (h.life <= 0) { hearts.splice(i, 1); continue; }
    const dx = player.x - h.x, dy = player.y - h.y;
    const d = Math.hypot(dx, dy) || 1;
    const mr = stat.magnetR();
    if (player.alive && d < mr) {
      const pull = (1 - d / mr) * 2200;
      h.vx += (dx / d) * pull * dt;
      h.vy += (dy / d) * pull * dt;
    }
    const fr = Math.exp(-1.8 * dt);
    h.vx *= fr; h.vy *= fr;
    h.x += h.vx * dt; h.y += h.vy * dt;
    if (player.alive && d < 20) {
      hearts.splice(i, 1);
      if (lives < 6) { lives++; addFloater(h.x, h.y - 12, '+1 LIFE', '#ff5c8a', 20); }
      else {
        const bonus = 1000 * mult;
        score += bonus;
        addFloater(h.x, h.y - 12, '+' + bonus.toLocaleString(), '#ff5c8a', 16);
      }
      SFX.heart();
    }
  }
}

// ============================================================
// DRAW
// ============================================================
function drawShip(x, y, ang, alpha, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ang);
  ctx.scale(scale || 1, scale || 1);
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(15, 0);
  ctx.lineTo(-10, 8.5);
  ctx.lineTo(-5.5, 0);
  ctx.lineTo(-10, -8.5);
  ctx.closePath();
  ctx.fillStyle = 'rgba(120,240,255,0.16)';
  ctx.fill();
  ctx.strokeStyle = COL.player;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawEnemy(e) {
  const spawning = e.spawnT > 0;
  const prog = spawning ? 1 - e.spawnT / 0.75 : 1;
  ctx.save();
  ctx.translate(e.x, e.y);
  if (spawning) {
    ctx.globalAlpha = prog * 0.6;
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, e.r + (1 - prog) * 34, 0, TAU);
    ctx.stroke();
  }
  ctx.globalAlpha = spawning ? prog * 0.55 : (e.phased ? 0.15 : 1);
  ctx.rotate(e.ang);
  ctx.lineWidth = 2;
  ctx.strokeStyle = e.flash > 0 ? '#ffffff' : e.color;
  const cc = e.color;
  ctx.fillStyle = `rgba(${parseInt(cc.slice(1,3),16)},${parseInt(cc.slice(3,5),16)},${parseInt(cc.slice(5,7),16)},0.14)`;
  ctx.beginPath();
  const r = e.r;
  if (e.type === 'chaser' || e.type === 'shard') {
    ctx.moveTo(r, 0); ctx.lineTo(-r * 0.7, r * 0.75); ctx.lineTo(-r * 0.3, 0); ctx.lineTo(-r * 0.7, -r * 0.75);
  } else if (e.type === 'wanderer') {
    ctx.rect(-r * 0.72, -r * 0.72, r * 1.44, r * 1.44);
  } else if (e.type === 'splitter') {
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * TAU - Math.PI / 2;
      i ? ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    }
  } else if (e.type === 'dodger') {
    ctx.moveTo(r, 0); ctx.lineTo(0, r * 0.72); ctx.lineTo(-r, 0); ctx.lineTo(0, -r * 0.72);
  } else if (e.type === 'sniper') {
    ctx.moveTo(r * 1.25, 0); ctx.lineTo(0, r * 0.45); ctx.lineTo(-r * 1.25, 0); ctx.lineTo(0, -r * 0.45);
  } else if (e.type === 'hunter') {
    ctx.moveTo(r, 0); ctx.lineTo(r * 0.25, r * 0.25); ctx.lineTo(0, r);
    ctx.lineTo(-r * 0.25, r * 0.25); ctx.lineTo(-r, 0); ctx.lineTo(-r * 0.25, -r * 0.25);
    ctx.lineTo(0, -r); ctx.lineTo(r * 0.25, -r * 0.25);
  } else if (e.type === 'boss') {
    const v = e.variant || 'sentinel';
    if (v === 'warden') {
      ctx.rect(-r * 0.8, -r * 0.8, r * 1.6, r * 1.6);
    } else if (v === 'hive') {
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * TAU - Math.PI / 2;
        i ? ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      }
    } else if (v === 'lancer') {
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * TAU, a2 = a + TAU / 6;
        if (!i) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
        else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        ctx.lineTo(Math.cos(a2) * r * 0.4, Math.sin(a2) * r * 0.4);
      }
    } else if (v === 'phantom') {
      ctx.moveTo(r, 0); ctx.lineTo(0, r * 0.7); ctx.lineTo(-r, 0); ctx.lineTo(0, -r * 0.7);
    } else { // sentinel
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * TAU;
        i ? ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      }
    }
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // elite double outline
  if (e.elite) {

      ctx.beginPath(); ctx.arc(player.x, player.y, 30, 0, TAU); ctx.stroke();
      if (odProg > 0) {
        const pulse = odReady ? 0.6 + 0.4 * Math.sin(now * 0.009) : 1;
        ctx.strokeStyle = odReady
          ? 'rgba(255,232,107,' + (0.55 + 0.45 * pulse).toFixed(2) + ')'
          : odCool > 0 ? 'rgba(255,140,110,0.5)' : 'rgba(255,196,84,0.62)';
        if (odReady) { ctx.shadowColor = '#ffe86b'; ctx.shadowBlur = 10 + pulse * 10; }
        ctx.beginPath();
        ctx.arc(player.x, player.y, 30, -Math.PI / 2, -Math.PI / 2 + TAU * odProg);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      // fully charged reads as a golden aura even in a crowded field
      if (odReady) {
        const p2 = 0.5 + 0.5 * Math.sin(now * 0.009);
        drawGlow(player.x, player.y, 46 + p2 * 10, 'rgba(255,232,107,1)', 0.16 + p2 * 0.14);
      }
    }

    // stasis field ring
    if ((player.up.stasis || 0) > 0) {
      ctx.strokeStyle = 'rgba(125,184,255,0.14)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 10]);
      ctx.lineDashOffset = -now * 0.02;
      ctx.beginPath();
      ctx.arc(player.x, player.y, 170, 0, TAU);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // bullets
  ctx.strokeStyle = COL.bullet;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  for (const b of bullets) {
    ctx.moveTo(b.x - b.vx * 0.014, b.y - b.vy * 0.014);
    ctx.lineTo(b.x, b.y);
  }
  ctx.stroke();
  for (const b of bullets) drawGlow(b.x, b.y, 10, 'rgba(255,232,107,1)', 0.5);

  // enemy bullets
  for (const b of ebullets) {
    drawGlow(b.x, b.y, 13, RGBA.ebullet, 0.6);
    ctx.fillStyle = COL.ebullet;
    ctx.beginPath(); ctx.arc(b.x, b.y, 3.4, 0, TAU); ctx.fill();
  }

  } // end inPlay entity block

  // particles (velocity-stretched) — also used for menu/ending ambience
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
    ctx.strokeStyle = p.color;
    ctx.beginPath();
    ctx.moveTo(p.x - p.vx * 0.02, p.y - p.vy * 0.02);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  // floaters
  ctx.textAlign = 'center';
  for (const f of floaters) {
    ctx.globalAlpha = clamp(f.life / f.max, 0, 1);
    ctx.fillStyle = f.color;
    ctx.font = `700 ${f.size}px Consolas, monospace`;
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  ctx.restore(); // end shake

  // vignette
  ctx.fillStyle = vign;
  ctx.fillRect(0, 0, W, H);

  // overdrive screen tint (subtle golden wash + edge vignette)
  if (odActive > 0) {
    const og = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.7);
    og.addColorStop(0, 'rgba(255,232,107,0)');
    og.addColorStop(1, `rgba(255,200,60,${0.12 + 0.04 * Math.sin(now * 0.01)})`);
    ctx.fillStyle = og; ctx.fillRect(0, 0, W, H);
  }
  // overdrive activation flash
  if (odFlash > 0) {
    ctx.fillStyle = `rgba(255,240,180,${odFlash * 1.6})`;
    ctx.fillRect(0, 0, W, H);
  }

  // death flash
  if (flashT > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashT * 2.4})`;
    ctx.fillRect(0, 0, W, H);
  }

  // ---------- HUD ----------
  if (state === S_PLAY) {
    // xp bar — animated fill, level-up flash, flowing shimmer
    const barH = 6;
    ctx.fillStyle = 'rgba(63,240,255,0.12)';
    ctx.fillRect(0, 0, W, barH);
    const fw = W * clamp(xpShown, 0, 1);
    ctx.fillStyle = COL.gem;
    ctx.fillRect(0, 0, fw, barH);
    // shimmer sweep
    if (fw > 4) {
      const sw = 90, sx = ((now * 0.12) % (fw + sw)) - sw;
      const sg = ctx.createLinearGradient(sx, 0, sx + sw, 0);
      sg.addColorStop(0, 'rgba(255,255,255,0)');
      sg.addColorStop(0.5, 'rgba(255,255,255,0.5)');
      sg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.save(); ctx.beginPath(); ctx.rect(0, 0, fw, barH); ctx.clip();
      ctx.fillStyle = sg; ctx.fillRect(sx, 0, sw, barH); ctx.restore();
    }
    // leading edge glow
    if (fw > 2 && fw < W - 2) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillRect(fw - 2, 0, 2, barH);
    }
    // level-up flash across the whole bar
    if (xpFlash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${xpFlash * 0.8})`;
      ctx.fillRect(0, 0, W, barH);
    }
    ctx.textAlign = 'center';
    const lvPulse = 1 + xpFlash * 0.5;
    ctx.fillStyle = xpFlash > 0 ? '#ffffff' : 'rgba(143,251,255,0.85)';
    ctx.font = `700 ${Math.round(13 * lvPulse)}px Consolas, monospace`;
    ctx.fillText('LV ' + level, W / 2, 24);

    ctx.textAlign = 'left';
    ctx.fillStyle = '#eaf6ff';
    ctx.font = '700 30px Consolas, monospace';
    ctx.fillText(score.toLocaleString(), 22, 44);
    const mp = 1 + multPulse * 0.25;
    ctx.fillStyle = COL.gem;
    ctx.font = `700 ${Math.round(18 * mp)}px Consolas, monospace`;
    ctx.fillText('x' + mult, 22, 70);

    // lives (hidden in tutorial)
    if (mode !== 'tutorial')
      for (let i = 0; i < Math.min(lives, 6); i++)
        drawShip(W - 30 - i * 30, 34, -Math.PI / 2, 0.9, 0.8);

    // wave label
    ctx.textAlign = 'right';
    ctx.fillStyle = mode === 'campaign' ? rgbaFromHex(planet.color).replace('1)', '0.85)') : 'rgba(160,190,255,0.7)';
    ctx.font = '600 14px Consolas, monospace';
    if (mode !== 'tutorial')
      ctx.fillText(mode === 'campaign'
        ? planet.name + (bossPhase ? ' · BOSS' : ' · WAVE ' + Math.max(wave, 1) + '/' + planet.waves)
        : 'WAVE ' + wave, W - 22, 66);

    // dash cooldown
    const dw = 90, dh = 5, dx0 = 22, dy0 = H - 26;
    ctx.fillStyle = 'rgba(120,240,255,0.15)';
    ctx.fillRect(dx0, dy0, dw, dh);
    const dr = 1 - player.dashCd / stat.dashCdMax();
    ctx.fillStyle = dr >= 1 ? COL.player : 'rgba(120,240,255,0.55)';
    ctx.fillRect(dx0, dy0, dw * clamp(dr, 0, 1), dh);
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(160,190,255,0.55)';
    ctx.font = '600 11px Consolas, monospace';
    ctx.fillText('DASH', dx0, dy0 - 6);

    // OVERDRIVE meter (radial dial, bottom-right) — shown in the tutorial once it's taught
    if (mode !== 'tutorial' || (tut && TUT_STEPS[tut.step].key === 'od')) {
      const ob = odButtonRect(), ready = odCharge >= OD_MAX, frac = odActive > 0 ? odActive / OD_DUR : odCharge / OD_MAX;
      const pulse = ready && odActive <= 0 ? (0.5 + 0.5 * Math.sin(now * 0.008)) : 0;
      ctx.save();
      // track
      ctx.strokeStyle = 'rgba(63,240,255,0.15)';
      ctx.lineWidth = 6;
      ctx.beginPath(); ctx.arc(ob.x, ob.y, ob.r, 0, TAU); ctx.stroke();
      // fill arc
      ctx.strokeStyle = odActive > 0 ? '#fff2a8' : ready ? COL.gem : odCool > 0 ? 'rgba(255,120,90,0.7)' : 'rgba(63,240,255,0.7)';
      ctx.lineWidth = 6; ctx.lineCap = 'round';
      if (ready || odActive > 0) { ctx.shadowColor = odActive > 0 ? '#ffe86b' : COL.gem; ctx.shadowBlur = 12 + pulse * 12; }
      ctx.beginPath(); ctx.arc(ob.x, ob.y, ob.r, -Math.PI / 2, -Math.PI / 2 + TAU * clamp(frac, 0, 1)); ctx.stroke();
      ctx.shadowBlur = 0; ctx.lineCap = 'butt';
      // core
      if (ready || odActive > 0) drawGlow(ob.x, ob.y, ob.r * (0.9 + pulse * 0.3), odActive > 0 ? 'rgba(255,232,107,1)' : RGBA.gem, 0.4 + pulse * 0.3);
      ctx.textAlign = 'center';
      ctx.fillStyle = odActive > 0 ? '#fff2a8' : ready ? '#ffffff' : 'rgba(160,190,255,0.7)';
      ctx.font = '800 12px Consolas, monospace';
      ctx.fillText(odActive > 0 ? odActive.toFixed(1) : 'OD', ob.x, ob.y + 1);
      ctx.font = '600 9px Consolas, monospace';
      ctx.fillStyle = odActive > 0 ? 'rgba(255,242,168,0.8)' : ready ? rgbaFromHex(COL.gem).replace('1)', '0.9)') : odCool > 0 ? 'rgba(255,140,110,0.75)' : 'rgba(150,180,255,0.5)';
      ctx.fillText(odActive > 0 ? 'ACTIVE' : ready ? (isTouch ? 'TAP!' : 'Q / RMB') : odCool > 0 ? 'VENTING' : Math.floor(odCharge) + '%', ob.x, ob.y + 15);
      ctx.restore();
    }

    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(160,190,255,0.45)';
    ctx.font = '600 11px Consolas, monospace';
    ctx.fillText('P PAUSE · M MUTE' + (muted ? ' [MUTED]' : ''), 130, H - 20);
  }

  // tutorial guidance overlay
  if (state === S_PLAY && mode === 'tutorial') drawTutorialOverlay(now);

  // banner
  if (banner) {
    const bt = banner.t / banner.max;
    const a = bt > 0.85 ? (1 - bt) / 0.15 : bt < 0.25 ? bt / 0.25 : 1;
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    ctx.fillStyle = banner.color;
    // a five-boss pack title is long — shrink until it fits rather than bleeding off-screen
    let bfs = 44;
    ctx.font = '900 ' + bfs + 'px Consolas, monospace';
    while (bfs > 16 && ctx.measureText(banner.txt).width > W * 0.9) {
      bfs -= 2;
      ctx.font = '900 ' + bfs + 'px Consolas, monospace';
    }
    ctx.shadowColor = banner.color; ctx.shadowBlur = 24;
    ctx.fillText(banner.txt, W / 2, H * 0.3);
    ctx.shadowBlur = 0;
    if (banner.sub) {
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.font = '600 15px Consolas, monospace';
      ctx.fillText(banner.sub, W / 2, H * 0.3 + 30);
    }
    ctx.globalAlpha = 1;
  }

  // ---------- level-up cards ----------
  if (state === S_PLAY && choice) {
    ctx.fillStyle = 'rgba(2,3,12,0.72)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = COL.gem;
    ctx.font = '900 38px Consolas, monospace';
    ctx.shadowColor = COL.gem; ctx.shadowBlur = 22;
    ctx.fillText('LEVEL ' + level, W / 2, H / 2 - 132);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(234,246,255,0.8)';
    ctx.font = '600 14px Consolas, monospace';
    ctx.fillText('choose an upgrade', W / 2, H / 2 - 106);
    const rs = cardRects(choice.length);
    for (let i = 0; i < choice.length; i++) {
      const u = choice[i], r = rs[i], hov = choiceHover === i;
      ctx.save();
      if (hov) {
        ctx.translate(r.x + r.w / 2, r.y + r.h / 2);
        ctx.scale(1.05, 1.05);
        ctx.translate(-(r.x + r.w / 2), -(r.y + r.h / 2));
      }
      ctx.fillStyle = hov ? 'rgba(18,25,50,0.98)' : 'rgba(9,13,28,0.95)';
      ctx.strokeStyle = u.color;
      ctx.lineWidth = hov ? 3 : 1.5;
      ctx.globalAlpha = hov ? 1 : 0.88;
      ctx.beginPath();
      ctx.roundRect(r.x, r.y, r.w, r.h, 10);
      ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = u.color;
      ctx.font = '900 17px Consolas, monospace';
      ctx.fillText(u.name, r.x + r.w / 2, r.y + 42);
      const cur = player.up[u.id] || 0;
      if (u.max <= 5) {
        for (let p = 0; p < u.max; p++) {
          ctx.fillStyle = p < cur ? u.color : 'rgba(255,255,255,0.15)';
          ctx.beginPath();
          ctx.arc(r.x + r.w / 2 + (p - (u.max - 1) / 2) * 14, r.y + 60, 3, 0, TAU);
          ctx.fill();
        }
      }
      ctx.fillStyle = 'rgba(234,246,255,0.85)';
      ctx.font = '600 13px Consolas, monospace';
      u.desc.forEach((l, li) => ctx.fillText(l, r.x + r.w / 2, r.y + 94 + li * 19));
      ctx.fillStyle = 'rgba(160,190,255,0.5)';
      ctx.font = '700 12px Consolas, monospace';
      ctx.fillText('[' + (i + 1) + ']', r.x + r.w / 2, r.y + r.h - 14);
      ctx.restore();
    }
  }

  // ---------- overlays ----------
  ctx.textAlign = 'center';
  if (state === S_STORY) {
    drawStory(now);
  } else if (state === S_MENU) {
    // hero planets — big ringed world lower-right, small moon upper-left
    drawPlanet(W * 0.82, H * 0.82, Math.min(W, H) * 0.26, now, '#5b6bff', { ring: true, ringTilt: -0.42 });
    drawPlanet(W * 0.09, H * 0.14, Math.min(W, H) * 0.045, now, '#ff8f6b');

    // decorative corner frame
    ctx.strokeStyle = 'rgba(143,200,255,0.28)';
    ctx.lineWidth = 1.5;
    const m = 26, L = 34;
    for (const [sx, sy, dx, dy] of [[m, m, 1, 1], [W - m, m, -1, 1], [m, H - m, 1, -1], [W - m, H - m, -1, -1]]) {
      ctx.beginPath();
      ctx.moveTo(sx + dx * L, sy); ctx.lineTo(sx, sy); ctx.lineTo(sx, sy + dy * L);
      ctx.stroke();
    }

    const tx = W / 2, ty = H * 0.27;
    // kicker
    ctx.fillStyle = 'rgba(143,251,255,0.65)';
    ctx.font = '700 13px Consolas, monospace';
    try { ctx.letterSpacing = '7px'; } catch (_) {}
    ctx.fillText('◈  SECTOR ZERO  ◈', tx + 3, ty - 78);
    // title — heavy pure-white bold
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#ffffff';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 5;
    ctx.font = '900 92px Consolas, monospace';
    ctx.shadowColor = 'rgba(150,200,255,0.55)'; ctx.shadowBlur = 40;
    try { ctx.letterSpacing = '12px'; } catch (_) {}
    ctx.fillText('NEOVOID', tx + 6, ty);
    ctx.strokeText('NEOVOID', tx + 6, ty); // stroke fattens the strokes
    ctx.shadowBlur = 0;
    try { ctx.letterSpacing = '0px'; } catch (_) {}
    // divider
    ctx.strokeStyle = 'rgba(143,200,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tx - 150, ty + 26); ctx.lineTo(tx - 14, ty + 26);
    ctx.moveTo(tx + 14, ty + 26); ctx.lineTo(tx + 150, ty + 26);
    ctx.stroke();
    ctx.fillStyle = 'rgba(143,200,255,0.55)';
    ctx.beginPath(); ctx.arc(tx, ty + 26, 2.5, 0, TAU); ctx.fill();
    // tagline
    ctx.fillStyle = 'rgba(190,215,255,0.75)';
    ctx.font = 'italic 600 16px Consolas, monospace';
    ctx.fillText('one ship against a dying galaxy', tx, ty + 52);

    // mode buttons
    const mrs = menuRects();
    const cCount = conquered.filter(Boolean).length;
    const items = [
      { title: 'CONQUEST', sub: 'liberate the galaxy, planet by planet', color: COL.chaser, glyph: 'planet',
        extra: cCount > 0 ? cCount + '/' + PLANETS.length + ' WORLDS' : 'NEW GAME' },
      { title: 'ENDLESS', sub: 'survive the ever-expanding sector', color: COL.gem, glyph: 'infinity',
        extra: best > 0 ? 'BEST ' + best.toLocaleString() : null },
    ];
    for (let i = 0; i < 2; i++) {
      const r = mrs[i], it = items[i], hov = menuHover === i;
      const push = hov ? 4 : 0;
      ctx.save();
      const bg = ctx.createLinearGradient(r.x, 0, r.x + r.w, 0);
      bg.addColorStop(0, hov ? 'rgba(20,28,58,0.96)' : 'rgba(10,15,32,0.85)');
      bg.addColorStop(1, hov ? 'rgba(12,18,40,0.96)' : 'rgba(8,11,24,0.82)');
      ctx.fillStyle = bg;
      ctx.strokeStyle = it.color;
      ctx.lineWidth = hov ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.roundRect(r.x - push, r.y, r.w + push * 2, r.h, 12);
      ctx.fill();
      if (hov) { ctx.shadowColor = it.color; ctx.shadowBlur = 20; }
      ctx.stroke();
      ctx.shadowBlur = 0;
      // accent bar
      ctx.fillStyle = it.color;
      ctx.beginPath();
      ctx.roundRect(r.x - push + 1, r.y + 1, 5, r.h - 2, 3);
      ctx.fill();
      // glyph
      const gx = r.x - push + 42, gy = r.y + r.h / 2;
      ctx.strokeStyle = it.color; ctx.lineWidth = 2;
      if (it.glyph === 'planet') {
        ctx.beginPath(); ctx.arc(gx, gy, 13, 0, TAU); ctx.stroke();
        ctx.save(); ctx.translate(gx, gy); ctx.rotate(-0.5);
        ctx.beginPath(); ctx.ellipse(0, 0, 20, 6, 0, 0, TAU); ctx.stroke(); ctx.restore();
      } else {
        ctx.beginPath();
        ctx.arc(gx - 6, gy, 7, 0.5, TAU + 0.5);
        ctx.arc(gx + 6, gy, 7, Math.PI + 0.5, Math.PI + TAU + 0.5);
        ctx.stroke();
      }
      ctx.textAlign = 'left';
      ctx.fillStyle = hov ? '#ffffff' : it.color;
      ctx.font = '900 22px Consolas, monospace';
      ctx.fillText(it.title, r.x - push + 74, r.y + 30);
      ctx.fillStyle = 'rgba(190,215,255,0.72)';
      ctx.font = '600 12px Consolas, monospace';
      ctx.fillText(it.sub, r.x - push + 74, r.y + 48);
      ctx.textAlign = 'right';
      ctx.fillStyle = 'rgba(150,180,255,0.45)';
      ctx.font = '700 12px Consolas, monospace';
      ctx.fillText(isTouch ? '▶' : '[' + (i + 1) + ']', r.x + r.w + push - 18, r.y + 26);
      if (it.extra) {
        ctx.fillStyle = i === 0 ? 'rgba(255,120,180,0.9)' : 'rgba(255,232,107,0.9)';
        ctx.font = '700 12px Consolas, monospace';
        ctx.fillText(it.extra, r.x + r.w + push - 18, r.y + 46);
      }
      ctx.restore();
    }

    // secondary buttons: STORY + TUTORIAL
    const secs = [
      { title: 'STORY', color: '#c792ff', idx: 2 },
      { title: 'TUTORIAL', color: '#8ffbff', idx: 3 },
    ];
    for (const s of secs) {
      const r = mrs[s.idx], hov = menuHover === s.idx;
      ctx.save();
      ctx.fillStyle = hov ? 'rgba(20,28,58,0.94)' : 'rgba(9,13,28,0.78)';
      ctx.strokeStyle = s.color;
      ctx.lineWidth = hov ? 2.5 : 1.5;
      ctx.globalAlpha = hov ? 1 : 0.82;
      ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 10);
      ctx.fill();
      if (hov) { ctx.shadowColor = s.color; ctx.shadowBlur = 16; }
      ctx.stroke(); ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.textAlign = 'center';
      ctx.fillStyle = hov ? '#ffffff' : s.color;
      ctx.font = '800 15px Consolas, monospace';
      ctx.fillText(s.title, r.x + r.w / 2, r.y + r.h / 2 + 5);
      ctx.restore();
    }

    // footer
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(150,180,255,0.4)';
    ctx.font = '600 12px Consolas, monospace';
    ctx.fillText(isTouch ? 'tap a mode to begin' : 'WASD move · aim mouse/arrows · SPACE dash · Q overdrive · ↑↓ + ENTER select', 30, H - 26);
    ctx.textAlign = 'right';
    ctx.fillText('M — ' + (muted ? 'UNMUTE' : 'MUTE'), W - 30, H - 26);
  } else if (state === S_GALAXY) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '900 34px Consolas, monospace';
    ctx.shadowColor = COL.wanderer; ctx.shadowBlur = 22;
    ctx.fillText('VOID GALAXY', W / 2, H * 0.12);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(170,200,255,0.7)';
    ctx.font = '600 13px Consolas, monospace';
    ctx.fillText((isTouch ? 'tap a planet to deploy' : 'click a planet or ←→ + ENTER · ESC — back')
      + '   ·   ' + conquered.filter(Boolean).length + '/' + PLANETS.length + ' LIBERATED', W / 2, H * 0.12 + 24);

    let nextIdx = -1;
    for (let i = 0; i < PLANETS.length; i++) if (!conquered[i]) { nextIdx = i; break; }

    // route
    ctx.strokeStyle = 'rgba(120,150,255,0.22)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    for (let i = 0; i < PLANETS.length; i++) {
      const p = galaxyPos(i);
      i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    for (let i = 0; i < PLANETS.length; i++) {
      const pl = PLANETS[i], p = galaxyPos(i);
      const locked = nextIdx !== -1 && i > nextIdx;
      const isNext = i === nextIdx;
      const hov = galaxyHover === i && !locked;
      const isCore = i === PLANETS.length - 1;
      const pr = (isCore ? 24 : 15) + (hov ? 3 : 0);
      ctx.globalAlpha = locked ? 0.32 : 1;

      if (locked) {
        // shrouded / undiscovered world
        drawGlow(p.x, p.y, pr * 2.2, 'rgba(120,130,170,1)', 0.18);
        ctx.fillStyle = 'rgba(20,24,40,0.9)';
        ctx.beginPath(); ctx.arc(p.x, p.y, pr, 0, TAU); ctx.fill();
        ctx.strokeStyle = 'rgba(150,160,200,0.5)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 4]);
        ctx.beginPath(); ctx.arc(p.x, p.y, pr, 0, TAU); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(180,190,220,0.7)';
        ctx.font = '700 13px Consolas, monospace';
        ctx.fillText('?', p.x, p.y + 4);
      } else {

  }
}

addEventListener('keydown', e => {
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.repeat) return;
  keys[e.code] = true;
  initAudio();
  if (e.code === 'KeyM') {
    muted = !muted;
    if (master) master.gain.value = muted ? 0 : 0.9;
  }
  if (state === S_STORY) {
    if (e.code === 'Escape') { endStory(); return; }
    if (e.code === 'Space' || e.code === 'Enter') { advanceStory(); return; }
    return;
  }
  if (state === S_MENU) {
    if (e.code === 'Digit1') { menuActivate(0); return; }
    if (e.code === 'Digit2') { menuActivate(1); return; }
    if (e.code === 'ArrowUp' || e.code === 'KeyW') { menuHover = (Math.max(menuHover, 0) + 3) % 4; return; }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') { menuHover = (Math.max(menuHover, 0) + 1) % 4; return; }
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'KeyA' || e.code === 'KeyD') {
      if (menuHover === 2) menuHover = 3; else if (menuHover === 3) menuHover = 2; return;
    }
    if (e.code === 'Enter' || e.code === 'Space') { menuActivate(menuHover < 0 ? 0 : menuHover); return; }
  }
  if (state === S_GALAXY) {
    if (e.code === 'Escape') { state = S_MENU; menuHover = 0; return; }
    if (e.code === 'KeyE' && allConquered()) { epiHover = false; epilogueReplay = true; startStory(false, ENDING); return; }
    let nextIdx = -1;
    for (let i = 0; i < PLANETS.length; i++) if (!conquered[i]) { nextIdx = i; break; }
    const maxSel = nextIdx === -1 ? PLANETS.length - 1 : nextIdx;
    if (e.code === 'ArrowRight' || e.code === 'ArrowDown' || e.code === 'KeyD' || e.code === 'KeyS') {
      galaxyHover = galaxyHover < 0 ? maxSel : Math.min(galaxyHover + 1, maxSel);
      return;
    }
    if (e.code === 'ArrowLeft' || e.code === 'ArrowUp' || e.code === 'KeyA' || e.code === 'KeyW') {
      galaxyHover = galaxyHover < 0 ? maxSel : Math.max(galaxyHover - 1, 0);
      return;
    }
    if (e.code === 'Enter' || e.code === 'Space') {
      startGame('campaign', galaxyHover >= 0 && galaxyHover <= maxSel ? galaxyHover : maxSel);
      return;
    }
  }
  if (state === S_END && (e.code === 'Space' || e.code === 'Enter' || e.code === 'Escape')) { state = S_MENU; return; }
  if (state === S_OVER && overT > 0.8) {
    if (e.code === 'Escape' || e.code === 'KeyH') { overActivate(1); return; }
    if (e.code === 'KeyR') { overActivate(0); return; }
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') { overHover = 0; return; }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') { overHover = 1; return; }
    if (e.code === 'Space' || e.code === 'Enter') { overActivate(overHover < 0 ? 0 : overHover); return; }
  }
  if (state === S_PLAY) {
    if (choice) {
      const idx = ['Digit1', 'Digit2', 'Digit3', 'Numpad1', 'Numpad2', 'Numpad3'].indexOf(e.code);
      if (idx >= 0 && choice[idx % 3]) { applyUpgrade(choice[idx % 3]); return; }
      if (e.code === 'ArrowRight' || e.code === 'KeyD')
        choiceHover = (Math.max(choiceHover, 0) + 1) % choice.length;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA')
        choiceHover = (Math.max(choiceHover, 0) - 1 + choice.length) % choice.length;
      if (e.code === 'Enter')
        applyUpgrade(choice[clamp(choiceHover, 0, choice.length - 1)]);
      return;
    }
    if (mode === 'tutorial') {
      if (e.code === 'Escape') { endTutorial(); return; }
      if (TUT_STEPS[tut.step].key === 'done' && tut.doneT > 0.5 && (e.code === 'Space' || e.code === 'Enter')) { endTutorial(); return; }
      if (e.code === 'Space' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') tryDash();
      if (e.code === 'KeyQ' || e.code === 'KeyE') activateOverdrive();
      return;
    }
    if (paused) {
      // ESC stays "resume" here — bailing to the menu abandons the run, so it gets its own key
      if (e.code === 'KeyP' || e.code === 'Escape') { pauseActivate(0); return; }
      if (e.code === 'KeyH') { pauseActivate(1); return; }
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') { pauseHover = 0; return; }
      if (e.code === 'ArrowRight' || e.code === 'KeyD') { pauseHover = 1; return; }
      if (e.code === 'Enter') { pauseActivate(pauseHover < 0 ? 0 : pauseHover); return; }
      return;
    }
    if (e.code === 'KeyP' || e.code === 'Escape') { paused = true; pauseHover = -1; return; }
    if (e.code === 'Space' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') tryDash();
    if (e.code === 'KeyQ' || e.code === 'KeyE') activateOverdrive();
  }
});
addEventListener('keyup', e => { keys[e.code] = false; });

function firstTarget() {
  for (let i = 0; i < PLANETS.length; i++) if (!conquered[i]) return i;

}
// pause overlay: resume, or bail out to the menu (abandons the run)
function pauseRects() {
  const w = 210, h = 46, gap = 18, y = H * 0.52;
  return [
    { x: W / 2 - w - gap / 2, y, w, h, label: 'RESUME' },
    { x: W / 2 + gap / 2, y, w, h, label: 'HOME' },

}
function pauseActivate(i) {

  pauseHover = -1;
  if (i === 1) { state = S_MENU; menuHover = 0; setArena(1, true); }
}
function pausePress(x, y) {
  const rs = pauseRects();
  for (let i = 0; i < rs.length; i++) {
    const r = rs[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) { pauseActivate(i); return true; }
  }
  return false;
}
// death screen: retry/continue on the left, always a way home on the right
function overRects() {
  const w = 210, h = 46, gap = 18, y = H * 0.66;
  const x0 = W / 2 - w - gap / 2;
  return [
    { x: x0, y, w, h, label: mode === 'campaign' ? 'GALAXY MAP' : 'RETRY' },
    { x: W / 2 + gap / 2, y, w, h, label: 'HOME' },
  ];
}
function overActivate(i) {
  if (i === 1) { state = S_MENU; menuHover = 0; overHover = -1; setArena(1, true); return; }
  if (mode === 'campaign') { state = S_GALAXY; galaxyHover = -1; setArena(1, true); }
  else startGame('endless');
  overHover = -1;
}
function menuActivate(i) {
  if (i === 0) { state = S_GALAXY; galaxyHover = firstTarget(); }

  else if (i === 2) startStory(false);
  else if (i === 3) startTutorial(false);
}
function galaxyHitTest(x, y) {
  let nextIdx = -1;
  for (let i = 0; i < PLANETS.length; i++) if (!conquered[i]) { nextIdx = i; break; }
  for (let i = 0; i < PLANETS.length; i++) {
    const p = galaxyPos(i);
    const pr = (i === PLANETS.length - 1 ? 21 : 14) + 10;
    if (dist2(x, y, p.x, p.y) < pr * pr) {
      return { i, locked: nextIdx !== -1 && i > nextIdx };

  }

}
function menuHitTest(x, y) {
  const mrs = menuRects();
  for (let i = 0; i < mrs.length; i++) {
    const r = mrs[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return i;
  }

}
function uiPress(x, y) {
  // shared menu/galaxy/end/gameover/story click handling; returns true if consumed
  if (state === S_STORY) { advanceStory(); return true; }
  if (state === S_MENU) {
    const m = menuHitTest(x, y);
    if (m >= 0) menuActivate(m);
    return true;
  }
  if (state === S_GALAXY) {
    if (allConquered()) {
      const r = epilogueRect();
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        epiHover = false;
        epilogueReplay = true;
        startStory(false, ENDING);

      }
    }
    const hit = galaxyHitTest(x, y);
    if (hit && !hit.locked) startGame('campaign', hit.i);
    return true;
  }
  if (state === S_END) { state = S_MENU; menuHover = -1; return true; }
  if (state === S_OVER) {
    if (overT > 0.8) {
      const rs = overRects();
      for (let i = 0; i < rs.length; i++) {
        const r = rs[i];
        if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) { overActivate(i); return true; }
      }
    }
    return true;
  }
  return false;
}

// touch twin-sticks
function stickUpdate(st, x, y) {

  st.dx = dx; st.dy = dy;
}

  if (paused) {
    const t0 = e.changedTouches[0];
    if (t0) pausePress(t0.clientX, t0.clientY);
    return;
  }
  if (choice) {
    for (const t of e.changedTouches) {
      const rs = cardRects(choice.length);
      for (let i = 0; i < rs.length; i++) {
        const r = rs[i];
        if (t.clientX >= r.x && t.clientX <= r.x + r.w && t.clientY >= r.y && t.clientY <= r.y + r.h) {
          applyUpgrade(choice[i]);
          break;
        }
      }
      if (!choice) break;
    }
    return;
  }
  if (mode === 'tutorial' && TUT_STEPS[tut.step].key === 'done' && tut.doneT > 0.5) { endTutorial(); return; }
  for (const t of e.changedTouches) {
    const ob = odButtonRect();
    if (odCharge >= OD_MAX && odActive <= 0 && dist2(t.clientX, t.clientY, ob.x, ob.y) < ob.r * ob.r) {
      activateOverdrive();
    } else if (t.clientX < W / 2 && stickL.id === -1) {
      stickL.id = t.identifier; stickL.ox = t.clientX; stickL.oy = t.clientY; stickL.dx = stickL.dy = 0;
    } else if (t.clientX >= W / 2 && stickR.id === -1) {
      stickR.id = t.identifier; stickR.ox = t.clientX; stickR.oy = t.clientY; stickR.dx = stickR.dy = 0;
    } else {
      tryDash(); // third finger anywhere
    }
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === stickL.id) stickUpdate(stickL, t.clientX, t.clientY);
    else if (t.identifier === stickR.id) stickUpdate(stickR, t.clientX, t.clientY);
  }
}, { passive: false });
function touchEnd(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === stickL.id) { stickL.id = -1; stickL.dx = stickL.dy = 0; }
    if (t.identifier === stickR.id) { stickR.id = -1; stickR.dx = stickR.dy = 0; }
  }
}
canvas.addEventListener('touchend', touchEnd);
canvas.addEventListener('touchcancel', touchEnd);

addEventListener('blur', () => { if (state === S_PLAY) paused = true; });

// ============================================================
// MAIN LOOP
// ============================================================
function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  initGrid();
  initStars();
  setArena(arena.frac, true);
  player.x = clamp(player.x, 14, W - 14);
  player.y = clamp(player.y, 14, H - 14);
}
addEventListener('resize', resize);
resize();
player.x = W / 2; player.y = H / 2;

// first-ever visit: play the prologue, then flow straight into the tutorial
if (!localStorage.getItem('neovoid_intro')) {
  localStorage.setItem('neovoid_intro', '1');
  storyIdx = 0; storyT = 0; storyChain = true;
  state = S_STORY;
}

let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  // resize watchdog — some embeds (itch.io iframes, preview panes) miss resize events
  if (innerWidth !== W || innerHeight !== H) resize();
  let raw = Math.min((now - last) / 1000, 1 / 30);
  last = now;
  const ts = hitStop > 0 ? 0.1 : 1;
  hitStop = Math.max(0, hitStop - raw);
  update(raw * ts, raw);
  draw(now);
}
requestAnimationFrame(frame);
</script>
